    <style>
* {
  box-sizing: border-box;
  user-select: none;
}

#spacing-input-x,
#spacing-input-y {
  user-select: text;
  -webkit-user-select: text;
  -moz-appearance: textfield;
}

#spacing-input-x::-webkit-inner-spin-button,
#spacing-input-x::-webkit-outer-spin-button,
#spacing-input-y::-webkit-inner-spin-button,
#spacing-input-y::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

body,
html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  color: #fff;
}

#canvas-container {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
  cursor: crosshair;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  display: block;
}

input[type="color"]::-webkit-color-swatch-wrapper {
  padding: 0;
}

input[type="color"]::-webkit-color-swatch {
  border: none;
}

/* Compact Toolbar Styles */
#toolbar {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(30, 30, 30, 0.9);
  backdrop-filter: blur(10px);
  border: 1px solid #444;
  border-radius: 8px;
  padding: 6px 10px;
  display: flex;
  gap: 4px;
  align-items: center;
  z-index: 10;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
  max-width: calc(100vw - 36px);
  overflow-x: auto;
  overflow-y: hidden;
}

#toolbar::-webkit-scrollbar {
  height: 4px;
}

#toolbar::-webkit-scrollbar-track {
  background: transparent;
}

#toolbar::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.2);
  border-radius: 2px;
}

#toolbar::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.4);
}

.tool-btn {
  background: transparent;
  border: 1px solid transparent;
  color: #ccc;
  padding: 6px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  flex-shrink: 0;
}

.tool-btn svg {
  width: 20px;
  height: 20px;
}

.tool-btn:hover {
  background: #333;
  color: #fff;
}

.font-size-btn:hover {
  background: #333;
  color: #fff;
}

.tool-btn.active {
  background: #007acc;
  color: #fff;
  border-color: #0098ff;
}

.line-width-btn {
  background: transparent;
  border: 1px solid transparent;
  color: #ccc;
  padding: 4px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
}

.line-width-btn:hover {
  background: #333;
  color: #fff;
}

.line-width-btn.active {
  background: #007acc;
  color: #fff;
  border-color: #0098ff;
}

#toggle-rulers-btn.active {
  color: #4fc3f7;
}

.separator {
  width: 1px;
  height: 24px;
  background: #444;
  margin: 0 4px;
  flex-shrink: 0;
}

.color-picker-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 9px;
  color: #aaa;
  gap: 1px;
  flex-shrink: 0;
}

.color-picker-wrapper input[type="color"] {
  border: none;
  width: 18px;
  height: 18px;
  border-radius: 4px;
  cursor: pointer;
  background: transparent;
  padding: 0;
  border: 1px solid rgba(211, 211, 211, 0.434);
}

.color-picker-inline {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 9px;
  color: #aaa;
  gap: 1px;
  flex-shrink: 0;
}

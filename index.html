<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Canvas Workspace</title>
    <style>
      * {
        box-sizing: border-box;
        user-select: none;
      }
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #fff;
      }
      #canvas-container {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        cursor: crosshair;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
      }
      /* Compact Toolbar Styles */
      #toolbar {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(30, 30, 30, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid #444;
        border-radius: 8px;
        padding: 6px 10px;
        display: flex;
        gap: 4px;
        align-items: center;
        z-index: 10;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      }
      .tool-btn {
        background: transparent;
        border: 1px solid transparent;
        color: #ccc;
        padding: 6px;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
      }
      .tool-btn svg {
        width: 20px;
        height: 20px;
      }
      .tool-btn:hover {
        background: #333;
        color: #fff;
      }
      .tool-btn.active {
        background: #007acc;
        color: #fff;
        border-color: #0098ff;
      }
      .separator {
        width: 1px;
        height: 24px;
        background: #444;
        margin: 0 4px;
      }
      .color-picker-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 9px;
        color: #aaa;
        gap: 1px;
      }
      .color-picker-wrapper input[type="color"] {
        border: none;
        width: 20px;
        height: 20px;
        border-radius: 4px;
        cursor: pointer;
        background: transparent;
        padding: 0;
      }
      .color-presets {
        display: flex;
        gap: 2px;
      }
      .preset-btn {
        width: 12px;
        height: 12px;
        border: 1px solid #555;
        border-radius: 2px;
        cursor: pointer;
        transition: transform 0.1s;
      }
      .preset-btn:hover {
        transform: scale(1.2);
      }
      /* Control Groups */
      .control-group {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        color: #aaa;
      }
      .control-group input[type="range"] {
        width: 120px;
        accent-color: #007acc;
        cursor: pointer;
      }
      .control-group select {
        background: #2d2d2d;
        color: #fff;
        border: 1px solid #555;
        padding: 3px;
        border-radius: 4px;
        outline: none;
        cursor: pointer;
        font-size: 11px;
      }
      #zoom-val {
        min-width: 32px;
        text-align: right;
      }
      /* Action buttons style */
      .action-container {
        display: flex;
        gap: 3px;
      }
      .action-btn {
        background: #28a745;
        color: white;
        border: none;
        padding: 6px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
        white-space: nowrap;
      }
      .action-btn:hover {
        background: #218838;
      }
      .action-btn.secondary-action {
        background: #6c757d;
      }
      .action-btn.secondary-action:hover {
        background: #5a6268;
      }
      .action-btn.blue-action {
        background: #17a2b8;
      }
      .action-btn.blue-action:hover {
        background: #138496;
      }
      .action-btn.dark-action {
        background: #343a40;
        border: 1px solid #454d55;
      }
      .action-btn.dark-action:hover {
        background: #23272b;
      }

      /* Alignment Panel */
      #alignment-panel {
        display: none;
        position: fixed;
        top: 72px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(30, 30, 30, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid #444;
        padding: 4px 8px;
        border-radius: 6px;
        gap: 4px;
        align-items: center;
        z-index: 11;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
      }
      .align-btn {
        background: transparent;
        border: 1px solid transparent;
        color: #ccc;
        padding: 4px;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
      }
      .align-btn svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }
      .align-btn:hover {
        background: #444;
        color: #fff;
      }
      .align-btn:active {
        background: #007acc;
        color: #fff;
      }
      .align-title {
        font-size: 10px;
        color: #888;
        margin: 0 4px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* Invisible Input element for text tools */
      #text-ghost-input {
        position: absolute;
        background: transparent;
        border: 1px dashed #007acc;
        color: #fff;
        font-family: sans-serif;
        outline: none;
        display: none;
        z-index: 100;
        padding: 2px;
      }
      /* Dynamic temporary toast notifications */
      #toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 122, 204, 0.95);
        color: #fff;
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 13px;
        z-index: 1000;
        display: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body style="background-color: #1e1e1e">
    <div id="toolbar">

      <button

        <svg

      >
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"
          />
        </svg>
      </button>

      <div class="separator"></div>

      <button
        class="tool-btn"
        id="tool-text"
        data-tool="text"
        title="Text Tool [T]"
      >
        <svg fill="currentColor" viewBox="0 0 24 24">
          <path d="M5 4v3h5.5v12h3V7H19V4H5z" />
        </svg>
      </button>
      <button
        class="tool-btn"
        id="tool-eraser"
        data-tool="eraser"
        title="Object Eraser Tool [E]"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M21 21H8a2 2 0 0 1-1.42-.587l-3.994-3.999a2 2 0 0 1 0-2.828l10-10a2 2 0 0 1 2.829 0l5.999 6a2 2 0 0 1 0 2.828L12.834 21"
          />
          <path d="m5.082 11.09 8.828 8.828" />
        </svg>
      </button>

      <div class="separator"></div>

      <div class="color-picker-wrapper" title="Draw Color & Presets">
        <div style="display: flex; align-items: center; gap: 3px">
          <input type="color" id="color-picker" value="#ff4444" />
          <div class="color-presets">
            <div
              class="preset-btn"
              style="background: #ff4444"
              data-color="#ff4444"
            ></div>
            <div
              class="preset-btn"
              style="background: #28a745"
              data-color="#28a745"
            ></div>
            <div
              class="preset-btn"
              style="background: #007acc"
              data-color="#007acc"
            ></div>
          </div>
        </div>
        <span>Color</span>
      </div>
      <div class="color-picker-wrapper" title="Background Workspace Color">
        <input type="color" id="bg-color-picker" value="#1e1e1e" />
        <span>BG</span>
      </div>

      <div class="control-group">
        <select id="font-size-select" title="Text Font Size Configuration">
          <option value="12">12px</option>
          <option value="16" selected>16px</option>
          <option value="20">20px</option>
          <option value="24">24px</option>
          <option value="32">32px</option>
          <option value="48">48px</option>
          <option value="64">64px</option>
        </select>
      </div>

      <div class="separator"></div>

      <div class="control-group" title="Zoom Slider">
        <input type="range" id="zoom-slider" min="5" max="200" value="100" />
        <span id="zoom-val">100%</span>
      </div>

      <div class="separator"></div>

      <div class="action-container">
        <button class="action-btn dark-action" id="center-canvas-btn">
          Center
        </button>
        <button class="action-btn" id="export-btn">Export</button>
        <button class="action-btn secondary-action" id="export-50-btn">
          Copy 50%
        </button>
        <button class="action-btn blue-action" id="download-images-btn">
          Assets
        </button>
      </div>
    </div>

    <div id="alignment-panel">
      <span class="align-title">Align</span>
      <button class="align-btn" data-align="left" title="Align Left">
        <svg viewBox="0 0 24 24">
          <path d="M4 2h2v20H4V2zm4 3h12v3H8V5zm0 6h8v3H8v-3zm0 6h11v3H8v-3z" />

        <svg viewBox="0 0 24 24">

      <div
        style="width: 1px; height: 18px; background: #444; margin: 0 4px"
      ></div>
      <span class="align-title">Distribute</span>
      <button
        class="align-btn"
        data-align="distributeX"

      >
        <svg viewBox="0 0 24 24">
          <path
            d="M4 22H2V2h2v20zM22 2h-2v20h2V2zM7 5h10v3H7V5zm2 6h6v3H9v-3z"
          />

        class="align-btn"
        data-align="distributeY"
        title="Distribute Vertically"
      >
        <svg viewBox="0 0 24 24">
          <path
            d="M2 4V2h20v2H2zm0 18v-2h20v2H2zM5 7h3v10H5V7zm6 2h3v6h-3V9z"

    <div id="toast">Canvas copied to clipboard as PNG!</div>
    <input type="text" id="text-ghost-input" />

    <div id="canvas-container">
      <canvas id="canvas"></canvas>
    </div>

    <script>
      const container = document.getElementById("canvas-container");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const ghostInput = document.getElementById("text-ghost-input");
      const fontSizeSelect = document.getElementById("font-size-select");
      const zoomSlider = document.getElementById("zoom-slider");
      const zoomValDisplay = document.getElementById("zoom-val");
      const exportBtn = document.getElementById("export-btn");
      const export50Btn = document.getElementById("export-50-btn");
      const downloadImagesBtn = document.getElementById("download-images-btn");
      const centerCanvasBtn = document.getElementById("center-canvas-btn");
      const alignmentPanel = document.getElementById("alignment-panel");
      const toast = document.getElementById("toast");
      const bgColorPicker = document.getElementById("bg-color-picker");

      const GRID_SIZE = 100;
      const CONSTANT_LINE_WIDTH = 4;
      const RESIZE_HANDLE_SIZE = 10;

      let currentTool = "pan";
      let preSpaceTool = null;
      let drawColor = "#ff4444";
      let bgColor = "#1e1e1e";
      let currentFontSize = 16;
      let transform = { x: 0, y: 0, zoom: 1 };

      let isInteracting = false;
      let startX, startY;
      let panLockDirection = null;
      let isMiddleClick = false;
      let isRightClickHand = false;
      let lastMousePos = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
      };
      let isShiftPressed = false;
      let isSpacePressed = false;

      let images = [];
      let drawings = [];
      let activeShape = null;
      let activeTextCoord = null;

      let selectedElements = [];
      let isRegionSelecting = false;
      let regionStart = { x: 0, y: 0 };
      let regionEnd = { x: 0, y: 0 };
      let dragOffsets = [];
      let resizingElement = null;
      let resizeStartBounds = null;

      let elementIdCounter = 0;

      container.addEventListener("contextmenu", (e) => {
        e.preventDefault();
      });

      function showToast(message) {
        toast.textContent = message;
        toast.style.display = "block";
        setTimeout(() => (toast.style.display = "none"), 2500);
      }

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        render();
      }
      window.addEventListener("resize", resize);

      function updateToolbarUI() {
        buttons.forEach((b) => {
          if (b.dataset.tool === currentTool) b.classList.add("active");
          else b.classList.remove("active");
        });
        toggleAlignmentPanelVisibility();
      }

      function toggleAlignmentPanelVisibility() {
        if (currentTool === "select" && selectedElements.length > 1) {
          alignmentPanel.style.display = "flex";
        } else {
          alignmentPanel.style.display = "none";
        }
      }

      const buttons = document.querySelectorAll(".tool-btn");
      buttons.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          if (ghostInput.style.display === "block") bakeText();
          const targetBtn = e.target.closest(".tool-btn");
          currentTool = targetBtn.dataset.tool;
          if (currentTool !== "select") selectedElements = [];
          updateToolbarUI();
          updateCursor();
          render();
        });
      });

      const colorPicker = document.getElementById("color-picker");
      colorPicker.addEventListener(
        "input",
        (e) => (drawColor = e.target.value),
      );

      const presetBtns = document.querySelectorAll(".preset-btn");
      presetBtns.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          drawColor = e.target.dataset.color;
          colorPicker.value = drawColor;
        });
      });

      bgColorPicker.addEventListener("input", (e) => {
        bgColor = e.target.value;
        document.body.style.backgroundColor = bgColor;
        render();
      });

      fontSizeSelect.addEventListener("change", (e) => {
        currentFontSize = parseInt(e.target.value);
        if (ghostInput.style.display === "block") {
          ghostInput.style.fontSize = `${currentFontSize * transform.zoom}px`;
        }
      });

      function updateCursor() {
        if (currentTool === "pan" || isRightClickHand)
          container.style.cursor = isInteracting ? "grabbing" : "grab";
        else if (currentTool === "select") container.style.cursor = "default";
        else if (currentTool === "eraser") container.style.cursor = "pointer";
        else if (currentTool === "text") container.style.cursor = "text";
        else container.style.cursor = "crosshair";
      }
      updateCursor();

      window.addEventListener("mousemove", (e) => {
        lastMousePos.x = e.clientX;
        lastMousePos.y = e.clientY;

        // Handle context hover cursor changes for resizer handles
        if (
          currentTool === "select" &&
          !isInteracting &&
          selectedElements.length === 1
        ) {
          const el = selectedElements[0];
          const mouseWorld = screenToWorld(e.clientX, e.clientY);
          let handleX = 0,
            handleY = 0;

          if (el.elementType === "image") {
            handleX = el.x + el.w;
            handleY = el.y + el.h;
          } else if (el.type === "text") {
            handleX = el.start.x + (el.w || 50);
            handleY = el.start.y + (el.h || el.fontSize);
          }

          if (handleX !== 0) {
            const threshold = RESIZE_HANDLE_SIZE / transform.zoom;
            if (
              Math.abs(mouseWorld.x - handleX) <= threshold &&
              Math.abs(mouseWorld.y - handleY) <= threshold
            ) {
              container.style.cursor = "nwse-resize";
              return;
            }
          }
          container.style.cursor = "default";
        }
      });

      window.addEventListener("keydown", (e) => {
        if (e.key === "Shift") isShiftPressed = true;
        if (e.key === " " || e.code === "Space") {
          if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT")
            return;
          e.preventDefault();
          if (!isSpacePressed) {
            isSpacePressed = true;
            if (currentTool !== "pan") {
              preSpaceTool = currentTool;
              currentTool = "pan";
              updateToolbarUI();
              updateCursor();
            }
          }
        }
      });

      window.addEventListener("keyup", (e) => {
        if (e.key === "Shift") {
          isShiftPressed = false;
          panLockDirection = null;
        }
        if (e.key === " " || e.code === "Space") {
          if (isSpacePressed) {
            isSpacePressed = false;
            if (preSpaceTool !== null) {
              currentTool = preSpaceTool;
              preSpaceTool = null;
              updateToolbarUI();
              updateCursor();
              render();
            }
          }
        }
      });

      window.addEventListener("blur", () => {
        isShiftPressed = false;
        isSpacePressed = false;
        panLockDirection = null;
        if (preSpaceTool !== null) {
          currentTool = preSpaceTool;
          preSpaceTool = null;
          updateToolbarUI();
          updateCursor();
        }
        render();
      });

      window.addEventListener("keydown", (e) => {
        if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT")
          return;
        const key = e.key.toLowerCase();
        if (e.key === "+" || e.key === "=") {
          e.preventDefault();
          applyZoom(transform.zoom * 1.1, lastMousePos.x, lastMousePos.y);
          return;
        }
        if (e.key === "-" || e.key === "_") {
          e.preventDefault();
          applyZoom(transform.zoom / 1.1, lastMousePos.x, lastMousePos.y);
          return;
        }
        if (key === "z") {
          e.preventDefault();
          let nextZoom = Math.abs(transform.zoom - 1.0) < 0.01 ? 0.3 : 1.0;
          applyZoom(nextZoom, lastMousePos.x, lastMousePos.y);
          return;
        }
        if (e.key === "Delete" || e.key === "Backspace") {
          if (currentTool === "select" && selectedElements.length > 0) {
            const idsToRemove = selectedElements.map((el) => el.id);
            images = images.filter((img) => !idsToRemove.includes(img.id));
            drawings = drawings.filter((d) => !idsToRemove.includes(d.id));
            showToast(`Removed ${selectedElements.length} selected asset(s)`);
            selectedElements = [];
            toggleAlignmentPanelVisibility();
            render();
          }
          return;
        }

        let targetTool = null;
        if (key === "h") targetTool = "pan";
        if (key === "v") targetTool = "select";
        if (key === "b") targetTool = "pen";
        if (key === "l") targetTool = "line";
        if (key === "a") targetTool = "arrow";
        if (key === "r") targetTool = "rect-border";
        if (key === "f") targetTool = "rect-fill";
        if (key === "t") targetTool = "text";
        if (key === "e") targetTool = "eraser";

        if (targetTool) {
          preSpaceTool = null;
          const btn = document.querySelector(`[data-tool="${targetTool}"]`);
          if (btn) btn.click();
        }
      });

      function screenToWorld(sx, sy) {
        return {
          x: (sx - transform.x) / transform.zoom,
          y: (sy - transform.y) / transform.zoom,
        };
      }
      function worldToScreen(wx, wy) {
        return {
          x: wx * transform.zoom + transform.x,
          y: wy * transform.zoom + transform.y,
        };
      }

      function snapToGrid(val) {
        return Math.round(val / GRID_SIZE) * GRID_SIZE;
      }

      function constraintToAngle(start, current) {
        const dx = current.x - start.x;
        const dy = current.y - start.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        let angle = Math.atan2(dy, dx);
        angle = Math.round(angle / (Math.PI / 4)) * (Math.PI / 4);
        return {
          x: start.x + distance * Math.cos(angle),
          y: start.y + distance * Math.sin(angle),
        };
      }

      function getPtToSegmentDist(p, a, b) {
        const l2 = Math.pow(a.x - b.x, 2) + Math.pow(a.y - b.y, 2);
        if (l2 === 0)
          return Math.sqrt(Math.pow(p.x - a.x, 2) + Math.pow(p.y - a.y, 2));
        let t = ((p.x - a.x) * (b.x - a.x) + (p.y - a.y) * (b.y - a.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.sqrt(
          Math.pow(p.x - (a.x + t * (b.x - a.x)), 2) +
            Math.pow(p.y - (a.y + t * (b.y - a.y)), 2),
        );
      }

      function getShapeBounds(shape) {
        let minX = Infinity,
          minY = Infinity,
          maxX = -Infinity,
          maxY = -Infinity;
        if (shape.type === "pen") {
          shape.points.forEach((p) => {
            if (p.x < minX) minX = p.x;
            if (p.y < minY) minY = p.y;
            if (p.x > maxX) maxX = p.x;
            if (p.y > maxY) maxY = p.y;
          });
        } else if (shape.type === "text") {
          if (!shape.w || !shape.h) {
            ctx.save();
            ctx.font = `${shape.fontSize}px sans-serif`;
            const metrics = ctx.measureText(shape.text);
            shape.w = metrics.width;
            shape.h = shape.fontSize;
            ctx.restore();
          }
          minX = shape.start.x;
          minY = shape.start.y;
          maxX = shape.start.x + shape.w;
          maxY = shape.start.y + shape.h;
        } else {
          minX = Math.min(shape.start.x, shape.end.x);
          minY = Math.min(shape.start.y, shape.end.y);
          maxX = Math.max(shape.start.x, shape.end.x);
          maxY = Math.max(shape.start.y, shape.end.y);
        }
        return { x: minX, y: minY, w: maxX - minX, h: maxY - minY, maxX, maxY };
      }

      function isPointHittingShape(p, shape) {
        const threshold = 12 / transform.zoom;
        if (shape.type === "pen") {
          for (let i = 0; i < shape.points.length - 1; i++) {
            if (
              getPtToSegmentDist(p, shape.points[i], shape.points[i + 1]) <
              threshold
            )
              return true;
          }
        } else if (shape.type === "line" || shape.type === "arrow") {
          return getPtToSegmentDist(p, shape.start, shape.end) < threshold;
        } else if (shape.type === "rect-border" || shape.type === "rect-fill") {
          const b = getShapeBounds(shape);
          if (shape.type === "rect-fill") {
            return p.x >= b.x && p.x <= b.maxX && p.y >= b.y && p.y <= b.maxY;
          } else {
            const top =
              getPtToSegmentDist(p, { x: b.x, y: b.y }, { x: b.maxX, y: b.y }) <
              threshold;
            const bot =
              getPtToSegmentDist(
                p,
                { x: b.x, y: b.maxY },
                { x: b.maxX, y: b.maxY },
              ) < threshold;
            const lft =
              getPtToSegmentDist(p, { x: b.x, y: b.y }, { x: b.x, y: b.maxY }) <
              threshold;
            const rgt =
              getPtToSegmentDist(
                p,
                { x: b.maxX, y: b.y },
                { x: b.maxX, y: b.maxY },
              ) < threshold;
            return top || bot || lft || rgt;
          }
        } else if (shape.type === "text") {
          const b = getShapeBounds(shape);
          return p.x >= b.x && p.x <= b.maxX && p.y >= b.y && p.y <= b.maxY;
        }
        return false;
      }

      function handleImageFile(file, worldX, worldY) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            images.push({
              id: "img_" + elementIdCounter++,
              elementType: "image",
              img: img,
              x: worldX - img.width / 2,
              y: worldY - img.height / 2,
              w: img.width,
              h: img.height,
            });
            render();
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      }

      window.addEventListener("paste", (e) => {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let item of items) {
          if (item.type.indexOf("image") === 0) {
            const blob = item.getAsFile();
            const worldCenter = screenToWorld(
              window.innerWidth / 2,
              window.innerHeight / 2,
            );
            handleImageFile(blob, worldCenter.x, worldCenter.y);
          }
        }
      });

      window.addEventListener("dragover", (e) => e.preventDefault());
      window.addEventListener("drop", (e) => {
        e.preventDefault();
        if (e.dataTransfer && e.dataTransfer.files.length > 0) {
          const dropWorldPos = screenToWorld(e.clientX, e.clientY);
          for (let file of e.dataTransfer.files) {
            if (file.type.indexOf("image/") === 0) {
              handleImageFile(file, dropWorldPos.x, dropWorldPos.y);
            }
          }
        }
      });

      function render(targetCtx = ctx, isExporting = false) {
        if (!isExporting) {
          targetCtx.fillStyle = bgColor;
          targetCtx.fillRect(0, 0, canvas.width, canvas.height);
        }

        targetCtx.save();
        if (!isExporting) {
          targetCtx.translate(transform.x, transform.y);
          targetCtx.scale(transform.zoom, transform.zoom);
        }

        // 1. Render Background Assets
        images.forEach((imgData) => {
          targetCtx.drawImage(
            imgData.img,
            imgData.x,
            imgData.y,
            imgData.w,
            imgData.h,
          );
          if (!isExporting && currentTool === "select") {
            const isSelected = selectedElements.some(
              (el) => el.id === imgData.id,
            );
            targetCtx.save();
            targetCtx.strokeStyle = isSelected ? "#ff4444" : "#007acc";
            targetCtx.lineWidth = (isSelected ? 3 : 1.5) / transform.zoom;
            targetCtx.strokeRect(imgData.x, imgData.y, imgData.w, imgData.h);

            if (isSelected && selectedElements.length === 1) {
              targetCtx.fillStyle = "#ff4444";
              const hSize = RESIZE_HANDLE_SIZE / transform.zoom;
              targetCtx.fillRect(
                imgData.x + imgData.w - hSize / 2,
                imgData.y + imgData.h - hSize / 2,
                hSize,
                hSize,
              );
            }
            targetCtx.restore();
          }
        });

        // 2. Render Vector Graphics & Text elements
        drawings.forEach((shape) => {
          drawShape(targetCtx, shape, isExporting);
          if (!isExporting && currentTool === "select") {
            const isSelected = selectedElements.some(
              (el) => el.id === shape.id,
            );
            if (isSelected) {
              const b = getShapeBounds(shape);
              targetCtx.save();
              targetCtx.strokeStyle = "#ff4444";
              targetCtx.lineWidth = 1.5 / transform.zoom;
              targetCtx.setLineDash([4 / transform.zoom, 4 / transform.zoom]);
              targetCtx.strokeRect(b.x - 4, b.y - 4, b.w + 8, b.h + 8);

              if (shape.type === "text" && selectedElements.length === 1) {
                targetCtx.fillStyle = "#ff4444";
                const hSize = RESIZE_HANDLE_SIZE / transform.zoom;
                targetCtx.fillRect(
                  b.maxX - hSize / 2,
                  b.maxY - hSize / 2,
                  hSize,
                  hSize,
                );
              }
              targetCtx.restore();
            }
          }
        });

        // Live preview layer
        if (!isExporting && activeShape) {
          drawShape(targetCtx, activeShape, false);
        }

        targetCtx.restore();

        // 3. Draw Selection Boxes
        if (!isExporting) {
          targetCtx.save();
          targetCtx.translate(transform.x, transform.y);
          targetCtx.scale(transform.zoom, transform.zoom);
          if (isRegionSelecting) {
            targetCtx.strokeStyle = "rgba(0, 122, 204, 0.8)";
            targetCtx.fillStyle = "rgba(0, 122, 204, 0.1)";
            targetCtx.lineWidth = 1.5 / transform.zoom;
            targetCtx.setLineDash([6 / transform.zoom, 4 / transform.zoom]);
            const rx = Math.min(regionStart.x, regionEnd.x);
            const ry = Math.min(regionStart.y, regionEnd.y);
            const rw = Math.abs(regionEnd.x - regionStart.x);
            const rh = Math.abs(regionEnd.y - regionStart.y);
            targetCtx.fillRect(rx, ry, rw, rh);
            targetCtx.strokeRect(rx, ry, rw, rh);
          }
          targetCtx.restore();
        }

        if (
          !isExporting &&
          ghostInput.style.display === "block" &&
          activeTextCoord
        ) {
          const screenPos = worldToScreen(activeTextCoord.x, activeTextCoord.y);
          ghostInput.style.left = `${screenPos.x}px`;
          ghostInput.style.top = `${screenPos.y - currentFontSize * transform.zoom * 0.2}px`;
          ghostInput.style.fontSize = `${currentFontSize * transform.zoom}px`;
        }
      }

      function drawShape(targetCtx, shape, isExporting) {
        let calculatedWidth = shape.width;
        if (shape.type !== "text") {
          // Boost the line width specifically for exports, otherwise scale with zoom
          calculatedWidth = isExporting
            ? 8
            : CONSTANT_LINE_WIDTH / transform.zoom;
        }

        targetCtx.save();
        targetCtx.strokeStyle = shape.color;
        targetCtx.fillStyle = shape.color;
        targetCtx.lineWidth = calculatedWidth;
        targetCtx.lineCap = "round";
        targetCtx.lineJoin = "round";

        if (shape.type === "pen") {
          if (shape.points.length < 2) {
            targetCtx.restore();
            return;
          }
          targetCtx.beginPath();
          targetCtx.moveTo(shape.points[0].x, shape.points[0].y);
          for (let i = 1; i < shape.points.length; i++)
            targetCtx.lineTo(shape.points[i].x, shape.points[i].y);
          targetCtx.stroke();
        } else if (shape.type === "line") {
          targetCtx.beginPath();
          targetCtx.moveTo(shape.start.x, shape.start.y);
          targetCtx.lineTo(shape.end.x, shape.end.y);
          targetCtx.stroke();
        } else if (shape.type === "arrow") {
          const dx = shape.end.x - shape.start.x;
          const dy = shape.end.y - shape.start.y;
          const len = Math.sqrt(dx * dx + dy * dy);

          if (len > 0.1) {
            const ux = dx / len;
            const uy = dy / len;
            const headLength = Math.max(
              16 / (isExporting ? 1 : transform.zoom),
              calculatedWidth * 3.5,
            );
            const headWidth = Math.max(
              10 / (isExporting ? 1 : transform.zoom),
              calculatedWidth * 2.2,
            );
            const cx = shape.end.x - headLength * ux;
            const cy = shape.end.y - headLength * uy;
            const nx = -uy * headWidth;
            const ny = ux * headWidth;

            targetCtx.beginPath();
            targetCtx.moveTo(shape.start.x, shape.start.y);
            targetCtx.lineTo(cx, cy);
            targetCtx.stroke();

            targetCtx.beginPath();
            targetCtx.moveTo(shape.end.x, shape.end.y);
            targetCtx.lineTo(cx + nx, cy + ny);
            targetCtx.lineTo(cx - nx, cy - ny);
            targetCtx.closePath();
            targetCtx.fill();
          } else {
            targetCtx.beginPath();
            targetCtx.moveTo(shape.start.x, shape.start.y);
            targetCtx.lineTo(shape.end.x, shape.end.y);
            targetCtx.stroke();
          }
        } else if (shape.type === "rect-border") {
          targetCtx.strokeRect(
            shape.start.x,
            shape.start.y,
            shape.end.x - shape.start.x,
            shape.end.y - shape.start.y,
          );
        } else if (shape.type === "rect-fill") {
          targetCtx.fillRect(
            shape.start.x,
            shape.start.y,
            shape.end.x - shape.start.x,
            shape.end.y - shape.start.y,
          );
        } else if (shape.type === "text") {
          targetCtx.font = `${shape.fontSize}px sans-serif`;
          targetCtx.textBaseline = "top";
          targetCtx.fillText(shape.text, shape.start.x, shape.start.y);

          const metrics = targetCtx.measureText(shape.text);
          shape.w = metrics.width;
          shape.h = shape.fontSize;

          if (!isExporting && currentTool === "select") {
            const isSelected = selectedElements.some(
              (el) => el.id === shape.id,
            );
            targetCtx.strokeStyle = isSelected
              ? "#ff4444"
              : "rgba(0, 122, 204, 0.4)";
            targetCtx.lineWidth = 1 / (isExporting ? 1 : transform.zoom);
            targetCtx.strokeRect(
              shape.start.x - 2,
              shape.start.y - 2,
              shape.w + 4,
              shape.h + 4,
            );
          }
        }
        targetCtx.restore();
      }

      function checkAndEraseAtPosition(worldPos) {
        let erasedSomething = false;
        for (let i = drawings.length - 1; i >= 0; i--) {
          if (isPointHittingShape(worldPos, drawings[i])) {
            drawings.splice(i, 1);
            erasedSomething = true;
          }
        }
        if (erasedSomething) {
          render();
        }
      }

      // --- MOUSE & EVENT LOGIC ---
      container.addEventListener("mousedown", (e) => {
        if (ghostInput.style.display === "block" && e.target !== ghostInput)
          bakeText();

        isInteracting = true;
        startX = e.clientX;
        startY = e.clientY;
        panLockDirection = null;
        resizingElement = null;

        isMiddleClick = e.button === 1;
        isRightClickHand = e.button === 2;

        let worldPos = screenToWorld(e.clientX, e.clientY);

        if (isMiddleClick || isRightClickHand || currentTool === "pan") {
          updateCursor();
          return;
        }

        if (currentTool === "eraser") {
          checkAndEraseAtPosition(worldPos);
          return;
        }

        if (currentTool === "text") {
          isInteracting = false;
          activeTextCoord = worldPos;
          ghostInput.value = "";
          ghostInput.style.display = "block";
          ghostInput.style.color = drawColor;
          const screenPos = worldToScreen(worldPos.x, worldPos.y);
          ghostInput.style.left = `${screenPos.x}px`;
          ghostInput.style.top = `${screenPos.y - currentFontSize * transform.zoom * 0.2}px`;
          ghostInput.style.fontSize = `${currentFontSize * transform.zoom}px`;
          setTimeout(() => ghostInput.focus(), 20);
          return;
        }

        if (currentTool === "select") {
          // 1. Check resize handle hits first
          if (selectedElements.length === 1) {
            const el = selectedElements[0];
            let handleX = 0,
              handleY = 0;
            if (el.elementType === "image") {
              handleX = el.x + el.w;
              handleY = el.y + el.h;
            } else if (el.type === "text") {
              handleX = el.start.x + (el.w || 50);
              handleY = el.start.y + (el.h || el.fontSize);
            }

            if (handleX !== 0) {
              const threshold = RESIZE_HANDLE_SIZE / transform.zoom;
              if (
                Math.abs(worldPos.x - handleX) <= threshold &&
                Math.abs(worldPos.y - handleY) <= threshold
              ) {
                resizingElement = el;
                if (el.elementType === "image") {
                  resizeStartBounds = {
                    x: el.x,
                    y: el.y,
                    w: el.w,
                    h: el.h,
                    ratio: el.w / el.h,
                    startMouse: { ...worldPos },
                  };
                } else {
                  resizeStartBounds = {
                    startX: el.start.x,
                    startY: el.start.y,
                    startFontSize: el.fontSize,
                    initialW: el.w,
                    startMouse: { ...worldPos },
                  };
                }
                return;
              }
            }
          }

          // 2. Normal element selection hit testing
          let clickedElement = null;
          const isModifierActive = e.metaKey || e.ctrlKey;

          for (let i = drawings.length - 1; i >= 0; i--) {
            if (isPointHittingShape(worldPos, drawings[i])) {
              clickedElement = drawings[i];
              if (clickedElement.type !== "text")
                clickedElement.elementType = "drawing";
              break;
            }
          }

          if (!clickedElement) {
            for (let i = images.length - 1; i >= 0; i--) {
              const img = images[i];
              if (
                worldPos.x >= img.x &&
                worldPos.x <= img.x + img.w &&
                worldPos.y >= img.y &&
                worldPos.y <= img.y + img.h
              ) {
                clickedElement = img;
                clickedElement.elementType = "image";
                if (!isModifierActive) {
                  images.push(images.splice(i, 1)[0]);
                }
                break;
              }
            }
          }

          if (clickedElement) {
            isRegionSelecting = false;
            if (isModifierActive) {
              const alreadySelectedIdx = selectedElements.findIndex(
                (el) => el.id === clickedElement.id,
              );
              if (alreadySelectedIdx !== -1) {
                selectedElements.splice(alreadySelectedIdx, 1);
              } else {
                selectedElements.push(clickedElement);
              }
            } else {
              const isAlreadyInSelection = selectedElements.some(
                (el) => el.id === clickedElement.id,
              );
              if (!isAlreadyInSelection) {
                selectedElements = [clickedElement];
              }
            }

            dragOffsets = selectedElements.map((el) => {
              if (el.elementType === "image") {
                return {
                  id: el.id,
                  type: "image",
                  x: el.x,
                  y: el.y,
                  startMouse: { ...worldPos },
                };
              } else if (el.type === "pen") {
                return {
                  id: el.id,
                  type: "points",
                  points: el.points.map((p) => ({ ...p })),
                  startMouse: { ...worldPos },
                };
              } else {
                return {
                  id: el.id,
                  type: "vectors",
                  start: { ...el.start },
                  end: el.end ? { ...el.end } : null,
                  startMouse: { ...worldPos },
                };
              }
            });
          } else {
            if (!isModifierActive) selectedElements = [];
            isRegionSelecting = true;
            regionStart = { ...worldPos };
            regionEnd = { ...worldPos };
          }
          toggleAlignmentPanelVisibility();
          render();
        } else if (
          ["pen", "line", "arrow", "rect-border", "rect-fill"].includes(
            currentTool,
          )
        ) {
          activeShape = {
            id: "draw_" + elementIdCounter++,
            type: currentTool,
            color: drawColor,
            width: CONSTANT_LINE_WIDTH,
            start: worldPos,
            end: worldPos,
            points: [worldPos],
          };
        }
      });

      container.addEventListener("mousemove", (e) => {
        if (!isInteracting) return;

        let dx = e.clientX - startX;
        let dy = e.clientY - startY;
        let worldPos = screenToWorld(e.clientX, e.clientY);

        if (isMiddleClick || isRightClickHand || currentTool === "pan") {
          if (isShiftPressed) {
            if (!panLockDirection) {
              if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
                panLockDirection = Math.abs(dx) >= Math.abs(dy) ? "x" : "y";
              }
            }
            if (panLockDirection === "x") dy = 0;
            else if (panLockDirection === "y") dx = 0;
          } else {
            panLockDirection = null;
          }
          transform.x += dx;
          transform.y += dy;
          startX = e.clientX;
          startY = e.clientY;
          updateZoomSliderValue();
          render();
          return;
        }

        if (currentTool === "eraser") {
          checkAndEraseAtPosition(worldPos);
          return;
        }

        if (currentTool === "select") {
          if (resizingElement) {
            const mouseDx = worldPos.x - resizeStartBounds.startMouse.x;
            if (resizingElement.elementType === "image") {
              let newW = resizeStartBounds.w + mouseDx;
              if (newW < 20) newW = 20;
              resizingElement.w = newW;
              resizingElement.h = newW / resizeStartBounds.ratio;
            } else if (resizingElement.type === "text") {
              let scaleFactor =
                (resizeStartBounds.initialW + mouseDx) /
                resizeStartBounds.initialW;
              let newFontSize = Math.max(
                8,
                Math.round(resizeStartBounds.startFontSize * scaleFactor),
              );
              resizingElement.fontSize = newFontSize;
            }
            render();
            return;
          }

          if (isRegionSelecting) {
            regionEnd = { ...worldPos };
            render();
          } else if (selectedElements.length > 0) {
            selectedElements.forEach((el) => {
              const offset = dragOffsets.find((o) => o.id === el.id);
              if (!offset) return;
              const curDx = worldPos.x - offset.startMouse.x;
              const curDy = worldPos.y - offset.startMouse.y;

              if (offset.type === "image") {
                let tx = offset.x + curDx;
                let ty = offset.y + curDy;
                if (isShiftPressed) {
                  tx = snapToGrid(tx);
                  ty = snapToGrid(ty);
                }
                el.x = tx;
                el.y = ty;
              } else if (offset.type === "points") {
                el.points = offset.points.map((p, idx) => {
                  let tx = p.x + curDx;
                  let ty = p.y + curDy;
                  if (isShiftPressed && idx === 0)
                    return { x: snapToGrid(tx), y: snapToGrid(ty) };
                  return { x: tx, y: ty };
                });
                if (isShiftPressed && el.points.length > 0) {
                  const finalDx = el.points[0].x - offset.points[0].x;
                  const finalDy = el.points[0].y - offset.points[0].y;
                  for (let k = 1; k < el.points.length; k++) {
                    el.points[k].x = offset.points[k].x + finalDx;
                    el.points[k].y = offset.points[k].y + finalDy;
                  }
                }
              } else {
                let tsx = offset.start.x + curDx;
                let tsy = offset.start.y + curDy;
                if (isShiftPressed) {
                  tsx = snapToGrid(tsx);
                  tsy = snapToGrid(tsy);
                }
                el.start.x = tsx;
                el.start.y = tsy;

                if (el.end && offset.end) {
                  let tex = offset.end.x + curDx;
                  let tey = offset.end.y + curDy;
                  if (isShiftPressed) {
                    const oldWidth = offset.end.x - offset.start.x;
                    const oldHeight = offset.end.y - offset.start.y;
                    tex = tsx + oldWidth;
                    tey = tsy + oldHeight;
                  }
                  el.end.x = tex;
                  el.end.y = tey;
                }
              }
            });
            render();
          }
        } else if (activeShape) {
          if (activeShape.type === "pen") {
            if (isShiftPressed && activeShape.points.length > 0)
              worldPos = constraintToAngle(activeShape.points[0], worldPos);
            activeShape.points.push(worldPos);
          } else {
            if (isShiftPressed)
              worldPos = constraintToAngle(activeShape.start, worldPos);
            activeShape.end = worldPos;
          }
          render();
        }
      });

      container.addEventListener("mouseup", (e) => {
        if (!isInteracting) return;
        isInteracting = false;
        panLockDirection = null;
        resizingElement = null;

        if (currentTool === "select" && isRegionSelecting) {
          isRegionSelecting = false;
          const rx = Math.min(regionStart.x, regionEnd.x);
          const ry = Math.min(regionStart.y, regionEnd.y);
          const rw = Math.abs(regionEnd.x - regionStart.x);
          const rh = Math.abs(regionEnd.y - regionStart.y);
          const isModifierActive = e.metaKey || e.ctrlKey;

          if (!isModifierActive) selectedElements = [];

          images.forEach((img) => {
            if (
              img.x >= rx &&
              img.x + img.w <= rx + rw &&
              img.y >= ry &&
              img.y + img.h <= ry + rh
            ) {
              if (!selectedElements.some((el) => el.id === img.id))
                selectedElements.push(img);
            }
          });

          drawings.forEach((shape) => {
            const b = getShapeBounds(shape);
            const overlaps =
              b.x < rx + rw &&
              b.x + b.w > rx &&
              b.y < ry + rh &&
              b.y + b.h > ry;
            if (overlaps) {
              if (shape.type !== "text") shape.elementType = "drawing";
              if (!selectedElements.some((el) => el.id === shape.id))
                selectedElements.push(shape);
            }
          });
          if (selectedElements.length > 0)
            showToast(`Selected group of ${selectedElements.length} assets`);
        }

        if (activeShape) {
          drawings.push(activeShape);
          activeShape = null;
        }

        toggleAlignmentPanelVisibility();
        render();
        isMiddleClick = false;
        isRightClickHand = false;
        updateCursor();
      });

      function bakeText() {
        const val = ghostInput.value.trim();
        if (val && activeTextCoord) {
          drawings.push({
            id: "text_" + elementIdCounter++,
            elementType: "text",
            type: "text",
            text: val,
            color: drawColor,
            fontSize: currentFontSize,
            start: { x: activeTextCoord.x, y: activeTextCoord.y },
          });
        }
        ghostInput.style.display = "none";
        activeTextCoord = null;
        render();
      }

      ghostInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          bakeText();
          container.focus();
        } else if (e.key === "Escape") {
          ghostInput.style.display = "none";
          activeTextCoord = null;
          container.focus();
          render();
        }
      });

      function applyZoom(newZoom, centerX, centerY) {
        if (newZoom < 0.05 || newZoom > 2.0) return;
        const oldZoom = transform.zoom;
        transform.x = centerX - (centerX - transform.x) * (newZoom / oldZoom);
        transform.y = centerY - (centerY - transform.y) * (newZoom / oldZoom);
        transform.zoom = newZoom;
        updateZoomSliderValue();
        render();
      }

      function updateZoomSliderValue() {
        const percent = Math.round(transform.zoom * 100);
        zoomSlider.value = percent;
        zoomValDisplay.textContent = `${percent}%`;
      }

      container.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();
          const zoomFactor = 1.1;
          const newZoom =
            e.deltaY < 0
              ? transform.zoom * zoomFactor
              : transform.zoom / zoomFactor;
          applyZoom(newZoom, e.clientX, e.clientY);
        },
        { passive: false },
      );

      zoomSlider.addEventListener("input", (e) => {
        const targetZoom = parseFloat(e.target.value) / 100;
        applyZoom(targetZoom, window.innerWidth / 2, window.innerHeight / 2);
      });

      zoomSlider.addEventListener("change", () => zoomSlider.blur());

      centerCanvasBtn.addEventListener("click", () => {
        transform.x = 0;
        transform.y = 0;
        transform.zoom = 1.0;
        updateZoomSliderValue();
        render();
        showToast("Centered camera view to coordinate (0,0)");
      });

      function translateElement(el, shiftX, shiftY) {
        if (el.elementType === "image") {
          el.x += shiftX;
          el.y += shiftY;
        } else if (el.type === "pen") {
          el.points.forEach((p) => {
            p.x += shiftX;
            p.y += shiftY;
          });
        } else {
          el.start.x += shiftX;
          el.start.y += shiftY;
          if (el.end) {
            el.end.x += shiftX;
            el.end.y += shiftY;
          }
        }
      }

      // --- ALIGNMENT PANEL COMPUTATION LOGIC ---
      const alignButtons = document.querySelectorAll(".align-btn");
      alignButtons.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          const targetBtn = e.target.closest(".align-btn");
          if (!targetBtn) return;
          const alignType = targetBtn.dataset.align;
          if (selectedElements.length < 2) return;

          let groupMinX = Infinity,
            groupMinY = Infinity;
          let groupMaxX = -Infinity,
            groupMaxY = -Infinity;

          const boundsMap = selectedElements.map((el) => {
            let b =
              el.elementType === "image"
                ? {
                    x: el.x,
                    y: el.y,
                    w: el.w,
                    h: el.h,
                    maxX: el.x + el.w,
                    maxY: el.y + el.h,
                  }
                : getShapeBounds(el);
            if (b.x < groupMinX) groupMinX = b.x;
            if (b.y < groupMinY) groupMinY = b.y;
            if (b.maxX > groupMaxX) groupMaxX = b.maxX;
            if (b.maxY > groupMaxY) groupMaxY = b.maxY;
            return { el, b };
          });

          const groupCenterX = (groupMinX + groupMaxX) / 2;
          const groupCenterY = (groupMinY + groupMaxY) / 2;

          if (alignType === "distributeX" || alignType === "distributeY") {
            if (selectedElements.length < 3) {
              showToast("Requires at least 3 elements to distribute spacing");
              return;
            }
            if (alignType === "distributeX") {
              boundsMap.sort((a, b) => a.b.x + a.b.w / 2 - (b.b.x + b.b.w / 2));
              const totalElementsWidth = boundsMap.reduce(
                (sum, item) => sum + item.b.w,
                0,
              );
              const availableSpace = groupMaxX - groupMinX - totalElementsWidth;
              const gap = availableSpace / (boundsMap.length - 1);
              let currentX = groupMinX;
              boundsMap.forEach((item, index) => {
                if (index > 0 && index < boundsMap.length - 1) {
                  translateElement(item.el, currentX - item.b.x, 0);
                }
                currentX += item.b.w + gap;
              });
            } else {
              boundsMap.sort((a, b) => a.b.y + a.b.h / 2 - (b.b.y + b.b.h / 2));
              const totalElementsHeight = boundsMap.reduce(
                (sum, item) => sum + item.b.h,
                0,
              );
              const availableSpace =
                groupMaxY - groupMinY - totalElementsHeight;
              const gap = availableSpace / (boundsMap.length - 1);
              let currentY = groupMinY;
              boundsMap.forEach((item, index) => {
                if (index > 0 && index < boundsMap.length - 1) {
                  translateElement(item.el, 0, currentY - item.b.y);
                }
                currentY += item.b.h + gap;
              });
            }
          } else {
            boundsMap.forEach(({ el, b }) => {
              let shiftX = 0,
                shiftY = 0;
              if (alignType === "left") shiftX = groupMinX - b.x;
              else if (alignType === "centerX")
                shiftX = groupCenterX - (b.x + b.w / 2);
              else if (alignType === "right") shiftX = groupMaxX - b.maxX;
              else if (alignType === "top") shiftY = groupMinY - b.y;
              else if (alignType === "centerY")
                shiftY = groupCenterY - (b.y + b.h / 2);
              else if (alignType === "bottom") shiftY = groupMaxY - b.maxY;
              translateElement(el, shiftX, shiftY);
            });
          }
          render();
          showToast(`Executed selection ${alignType}`);
        });
      });

      function getCanvasContentBounds() {
        let minX = Infinity,
          minY = Infinity;
        let maxX = -Infinity,
          maxY = -Infinity;
        function expandBounds(x, y) {
          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }
        images.forEach((img) => {
          expandBounds(img.x, img.y);
          expandBounds(img.x + img.w, img.y + img.h);
        });
        drawings.forEach((shape) => {
          const b = getShapeBounds(shape);
          expandBounds(b.x, b.y);
          expandBounds(b.x + b.w, b.y + b.h);
        });
        const padding = 50;
        return {
          minX: minX - padding,
          minY: minY - padding,
          maxX: maxX + padding,
          maxY: maxY + padding,
        };
      }

      async function executePNGExport(scaleFactor = 1.0) {
        if (images.length === 0 && drawings.length === 0) {
          showToast("Canvas is completely empty!");
          return;
        }
        const bounds = getCanvasContentBounds();
        const exportW = (bounds.maxX - bounds.minX) * scaleFactor;
        const exportH = (bounds.maxY - bounds.minY) * scaleFactor;

        const finalCanvas = document.createElement("canvas");
        finalCanvas.width = exportW;
        finalCanvas.height = exportH;
        const finalCtx = finalCanvas.getContext("2d");

        finalCtx.fillStyle = bgColor;
        finalCtx.fillRect(0, 0, exportW, exportH);

        finalCtx.save();
        finalCtx.scale(scaleFactor, scaleFactor);
        finalCtx.translate(-bounds.minX, -bounds.minY);

        images.forEach((imgData) =>
          finalCtx.drawImage(
            imgData.img,
            imgData.x,
            imgData.y,
            imgData.w,
            imgData.h,
          ),
        );
        drawings.forEach((shape) => drawShape(finalCtx, shape, true));
        finalCtx.restore();

        finalCanvas.toBlob(async (blob) => {
          if (!blob) {
            showToast("Failed to compile image asset");
            return;
          }
          try {
            await navigator.clipboard.write([
              new ClipboardItem({ "image/png": blob }),
            ]);
            showToast(
              scaleFactor === 0.5
                ? "50% scale PNG copied!"
                : "Full scale PNG copied!",
            );
          } catch (err) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `canvas_export_${Date.now()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("Downloaded PNG File");
          }
        }, "image/png");
      }

      exportBtn.addEventListener("click", () => executePNGExport(1.0));
      export50Btn.addEventListener("click", () => executePNGExport(0.5));

      downloadImagesBtn.addEventListener("click", () => {
        if (images.length === 0) {
          showToast("No pasted images found to download!");
          return;
        }
        images.forEach((imgData, index) => {
          const tempCanvas = document.createElement("canvas");
          tempCanvas.width = imgData.img.naturalWidth || imgData.w;
          tempCanvas.height = imgData.img.naturalHeight || imgData.h;
          tempCanvas.getContext("2d").drawImage(imgData.img, 0, 0);
          const a = document.createElement("a");
          a.href = tempCanvas.toDataURL("image/png");
          a.download = `pasted_asset_${index + 1}.png`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        });
        showToast(`Downloading ${images.length} separate asset files...`);
      });

      resize();
    </script>
  </body>
</html>

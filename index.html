<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Canvas Workspace</title>
    <script src="lib/jszip.min.js"></script>
    <link rel="stylesheet" href="styles.css">

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖌</text></svg>"
    />
  </head>
  <body style="background-color: #f0f0f0">
    <div id="toolbar">
      <button class="tool-btn" id="toolbar-menu-btn" title="Menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      </button>

      <div class="separator"></div>

      <button
        class="tool-btn active"
        id="tool-pan"
        data-tool="pan"
        title="Hand Tool [H]"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2" />
          <path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2" />
          <path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8" />
          <path
            d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"
          />
        </svg>
      </button>
      <button
        class="tool-btn"
        id="tool-select"
        data-tool="select"
        title="Select Tool [V]"
      >
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 2l12 11.2-5.3.7 3.5 6.6-2.5 1.3-3.6-6.6-4.1 3.5V2z" />
        </svg>
      </button>
      <button
        class="tool-btn"
        id="tool-measure"
        data-tool="measure"
        title="Measure Tool [M]"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 7 8.7 2.7a2.41 2.41 0 0 0-3.4 0L2.7 5.3a2.41 2.41 0 0 0 0 3.4L7 13"/><path d="m8 6 2-2"/><path d="m18 16 2-2"/><path d="m17 11 4.3 4.3c.94.94.94 2.46 0 3.4l-2.6 2.6c-.94.94-2.46.94-3.4 0L11 17"/><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>
      </button>

      <div class="separator"></div>

      <button
        class="tool-btn"
        id="tool-pen"
        data-tool="pen"
        title="Pen Tool [B]"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"
          />
        </svg>
      </button>
      <button
        class="tool-btn"
        id="tool-line"
        data-tool="line"
        title="Line Tool [L]"
      >
        <svg fill="currentColor" viewBox="0 0 24 24">
          <path d="M4 20L20 4l1.5 1.5L5.5 21.5z" />
        </svg>
      </button>
      <button
        class="tool-btn"
        id="tool-arrow"
        data-tool="arrow"
        title="Arrow Tool [A]"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M19 13V19H13" />
          <path d="M5 5L19 19" />
        </svg>
      </button>
      <button
        class="tool-btn"
        id="tool-rect-border"
        data-tool="rect-border"
        title="Box Border Tool [R]"
      >
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"
          />
        </svg>
      </button>
      <button
        class="tool-btn"
        id="tool-rect-fill"
        data-tool="rect-fill"
        title="Box Fill Tool [F]"
      >
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"
          />
        </svg>
      </button>

      <div class="separator"></div>

      <button
        class="tool-btn"
        id="tool-text"
        data-tool="text"
        title="Text Tool [T]"
      >
        <svg fill="currentColor" viewBox="0 0 24 24">
          <path d="M5 4v3h5.5v12h3V7H19V4H5z" />
        </svg>
      </button>
      <button
        class="tool-btn"
        id="tool-text-element"
        data-tool="text-element"
        title="Sticky Note Text [N]"
      >
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="3" width="18" height="18" rx="2" fill="#f5e642" opacity="0.85"/>
          <text x="12" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">T</text>
        </svg>
      </button>
      <button
        class="tool-btn"
        id="tool-eraser"
        data-tool="eraser"
        title="Object Eraser Tool [E]"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M21 21H8a2 2 0 0 1-1.42-.587l-3.994-3.999a2 2 0 0 1 0-2.828l10-10a2 2 0 0 1 2.829 0l5.999 6a2 2 0 0 1 0 2.828L12.834 21"
          />
          <path d="m5.082 11.09 8.828 8.828" />
        </svg>
      </button>

      <div class="separator"></div>

      <div class="color-picker-wrapper" title="Draw Color & Presets">
        <div style="display: flex; align-items: center; gap: 3px">
          <input type="color" id="color-picker" value="#ff4444" />
          <div class="color-presets">
            <div
              class="preset-btn"
              style="background: #ff4444"
              data-color="#ff4444"
            ></div>
            <div
              class="preset-btn"
              style="background: #28a745"
              data-color="#28a745"
            ></div>
            <div
              class="preset-btn"
              style="background: #007acc"
              data-color="#007acc"
            ></div>
            <div
              class="preset-btn"
              style="background: #f5e542"
              data-color="#f5e542"
            ></div>
            <div
              class="preset-btn"
              style="background: #f0f0f0"
              data-color="#f0f0f0"
            ></div>
            <div
              class="preset-btn"
              style="background: #1e1e1e"
              data-color="#1e1e1e"
            ></div>
          </div>
        </div>
        <span id="color-label">Color</span>
      </div>
      <div class="color-picker-wrapper" title="Background Workspace Color">
        <input type="color" id="bg-color-picker" value="#f0f0f0" />
        <span>BG</span>
      </div>

      <div class="separator"></div>

      <div class="control-group">
        <button class="font-size-btn" id="font-size-minus" title="Decrease font size by 16px" style="width:24px;height:24px;padding:2px;background:transparent;border:1px solid transparent;color:#ccc;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><rect x="5" y="11" width="14" height="2" rx="1"/></svg>
        </button>
        <select id="font-size-select" title="Text Font Size Configuration">
          <option value="12">12px</option>
          <option value="16">16px</option>
          <option value="20">20px</option>
          <option value="24">24px</option>
          <option value="32">32px</option>
          <option value="48" selected>48px</option>
          <option value="64">64px</option>
          <option value="80">80px</option>
          <option value="96">96px</option>
          <option value="112">112px</option>
          <option value="128">128px</option>
        </select>
        <button class="font-size-btn" id="font-size-plus" title="Increase font size by 16px" style="width:24px;height:24px;padding:2px;background:transparent;border:1px solid transparent;color:#ccc;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5z"/></svg>
        </button>
      </div>

      <div class="separator"></div>

      <div class="control-group" title="Zoom Slider">
        <input
          type="range"
          id="zoom-slider"
          min="10"
          max="200"
          value="100"
          step="10"
          list="range-snap-points"
        />
        <datalist id="range-snap-points">
          <option value="10"></option>
          <option value="50"></option>
          <option value="100"></option>
          <option value="150"></option>
          <option value="200"></option>
        </datalist>
        <span id="zoom-val">100%</span>
      </div>
    </div>

    <div class="toolbar-menu" id="toolbar-menu">
      <div class="menu-item menu-item-select" title="Color Vision Filter">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-glasses-icon lucide-glasses"><circle cx="6" cy="15" r="4"/><circle cx="18" cy="15" r="4"/><path d="M14 15a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/><path d="M2.5 13 5 7c.7-1.3 1.4-2 3-2"/><path d="M21.5 13 19 7c-.7-1.3-1.5-2-3-2"/></svg>
        <select id="filter-select">
          <option value="none">No filter</option>
          <option value="grayscale">Grayscale</option>
          <option value="protanopia">Protanopia</option>
          <option value="deuteranopia">Deuteranopia</option>
          <option value="tritanopia">Tritanopia</option>
          <option value="achromatopsia">Achromatopsia</option>
          <option value="low-contrast">Low contrast</option>
          <option value="high-contrast">High contrast</option>
          <option value="low-quality-display">Low quality</option>
        </select>
      </div>
      <button class="menu-item" id="toggle-rulers-btn" title="Toggle Rulers [Shift+R]">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.41 2.41 0 0 1 0-3.4l2.6-2.6a2.41 2.41 0 0 1 3.4 0Z"/><path d="m14.5 12.5 2-2"/><path d="m11.5 9.5 2-2"/><path d="m8.5 6.5 2-2"/><path d="m17.5 15.5 2-2"/></svg>
        <span>Toggle Rulers</span>
        <kbd>Shift+R</kbd>
      </button>
      <div class="menu-separator"></div>
      <button class="menu-item" id="undo-btn" title="Undo [Mod+Z]">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M9 14l-4 -4l4 -4" /><path d="M5 10h11a4 4 0 1 1 0 8h-1" /></svg>
        <span>Undo</span>
        <kbd data-shortcut="mod+Z"></kbd>
      </button>
      <button class="menu-item" id="redo-btn" title="Redo [Mod+Shift+Z]">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M15 14l4 -4l-4 -4" /><path d="M19 10h-11a4 4 0 1 0 0 8h1" /></svg>
        <span>Redo</span>
        <kbd data-shortcut="mod+shift+Z"></kbd>
      </button>
      <div class="menu-separator"></div>
      <button class="menu-item" id="group-btn" title="Group [Mod+G]">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5c0-1.1.9-2 2-2h2"/><path d="M17 3h2c1.1 0 2 .9 2 2v2"/><path d="M21 17v2c0 1.1-.9 2-2 2h-2"/><path d="M7 21H5c-1.1 0-2-.9-2-2v-2"/><rect width="7" height="5" x="7" y="7" rx="1"/><rect width="7" height="5" x="10" y="12" rx="1"/></svg>
        <span>Group</span>
        <kbd data-shortcut="mod+G"></kbd>
      </button>
      <button class="menu-item" id="ungroup-btn" title="Ungroup [Mod+Shift+G]">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="6" x="5" y="4" rx="1"/><rect width="8" height="6" x="11" y="14" rx="1"/></svg>
        <span>Ungroup</span>
        <kbd data-shortcut="mod+shift+G"></kbd>
      </button>
      <div class="menu-separator"></div>
      <button class="menu-item" id="open-file-btn" title="Open canvas file [Mod+O]">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2 2h4a2 2 0 0 1 2 2v1"/><path d="M20 19a2 2 0 0 0 2-2l-1.5-5a2 2 0 0 0-2-2H6.5a2 2 0 0 0-2 2L3 17a2 2 0 0 0 2 2h15z"/></svg>
        <span>Open</span>
        <kbd data-shortcut="mod+O"></kbd>
      </button>
      <button class="menu-item" id="save-file-btn" title="Save canvas file [Mod+S]">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></svg>
        <span>Save</span>
        <kbd data-shortcut="mod+S"></kbd>
      </button>
      <div class="menu-separator"></div>
      <button class="menu-item" id="export-btn" data-title-template="Copy canvas (or selection) as PNG [Shift-click: 50% scale, {alt}{mod}E: 50% scale]">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
        <span>Export PNG</span>
        <kbd data-shortcut="mod+E"></kbd>
      </button>
      <button class="menu-item" id="download-png-btn" title="Download canvas (or selection) as PNG file [Shift: 50% scale]">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17V3"/><path d="m6 11 6 6 6-6"/><path d="M19 21H5"/></svg>
        <span>Download PNG</span>
        <kbd data-shortcut="mod+shift+E"></kbd>
      </button>
      <button class="menu-item" id="download-images-btn" title="Download pasted images as files">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17V3"/><path d="m6 11 6 6 6-6"/><path d="M19 21H5"/></svg>
        <span>Download Assets</span>
      </button>
      <div class="menu-separator"></div>
      <button class="menu-item" id="center-canvas-btn" title="Center view on selection or origin">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4"/><path d="M12 18v4"/><path d="M2 12h4"/><path d="M18 12h4"/></svg>
        <span>Center View</span>
      </button>
    </div>

    <div id="alignment-panel">
      <div id="alignment-group" style="display:flex;align-items:center;gap:4px;">
      <span class="align-title">Align</span>
      <button class="align-btn" data-align="left" title="Align Left">
        <svg viewBox="0 0 24 24">
          <path d="M4 2h2v20H4V2zm4 3h12v3H8V5zm0 6h8v3H8v-3zm0 6h11v3H8v-3z" />
        </svg>
      </button>
      <button class="align-btn" data-align="centerX" title="Align Center X">
        <svg viewBox="0 0 24 24">
          <path d="M11 2h2v3h6v3h-6v8h4v3h-4v3h-2v-3H7v-3h4v-8H5V5h6V2z" />
        </svg>
      </button>
      <button class="align-btn" data-align="right" title="Align Right">
        <svg viewBox="0 0 24 24">
          <path
            d="M18 2h2v20h-2V2zM4 5h12v3H4V5zm4 6h8v3H8v-3zm-3 6h11v3H5v-3z"
          />
        </svg>
      </button>
      <div
        style="width: 1px; height: 18px; background: #444; margin: 0 4px"
      ></div>
      <button class="align-btn" data-align="top" title="Align Top">
        <svg viewBox="0 0 24 24">
          <path d="M2 4h20v2H2V4zm3 4h3v12H5V8zm6 0h3v8h-3V8zm6 0h3v11h-3V8z" />
        </svg>
      </button>
      <button class="align-btn" data-align="centerY" title="Align Center Y">
        <svg viewBox="0 0 24 24">
          <path d="M2 11h3V5h3v6h8V7h3v4h3v2h-3v4h-3v-4H8v6H5v-6H2v-2z" />
        </svg>
      </button>
      <button class="align-btn" data-align="bottom" title="Align Bottom">
        <svg viewBox="0 0 24 24">
          <path
            d="M2 18h20v2H2v-2zm3-11h3v10H5V7zm6 4h3v6h-3v-6zm6-7h3v13h-3V4z"
          />
        </svg>
      </button>
      <div
        style="width: 1px; height: 18px; background: #444; margin: 0 4px"
      ></div>
      <span class="align-title">Distribute</span>
      <button
        class="align-btn"
        data-align="distributeX"
        title="Distribute Horizontally"
      >
        <svg viewBox="0 0 24 24">
          <path
            d="M4 22H2V2h2v20zM22 2h-2v20h2V2zM7 5h10v3H7V5zm2 6h6v3H9v-3z"
          />
        </svg>
      </button>
      <button
        class="align-btn"
        data-align="distributeY"
        title="Distribute Vertically"
      >
        <svg viewBox="0 0 24 24">
          <path
            d="M2 4V2h20v2H2zm0 18v-2h20v2H2zM5 7h3v10H5V7zm6 2h3v6h-3V9z"
          />
        </svg>
      </button>
      <div
        style="width: 1px; height: 18px; background: #444; margin: 0 4px"
      ></div>
      <span class="align-title">Spacing</span>
      <button
        class="align-btn"
        data-align="spacingXMinus"
        title="Decrease Horizontal Spacing"
      >
        <svg viewBox="0 0 24 24">
          <path d="M9 12l2-1.5v3L9 12zM15 12l-2-1.5v3l2-1.5z" fill="currentColor"/>
        </svg>
      </button>
      <input
        type="number"
        id="spacing-input-x"
        value="10"
        min="0"
        max="500"
        step="10"
        title="Horizontal spacing (px) — Enter to apply"
        style="
          width: 48px;
          background: #2d2d2d;
          color: #fff;
          border: 1px solid #555;
          border-radius: 4px;
          padding: 2px 4px;
          font-size: 11px;
          text-align: center;
          outline: none;
        "
      />
      <button
        class="align-btn"
        data-align="spacingXPlus"
        title="Increase Horizontal Spacing"
      >
        <svg viewBox="0 0 24 24">
          <path d="M8 12l2 1.5v-3L8 12zM16 12l-2 1.5v-3l2 1.5z" fill="currentColor"/>
        </svg>
      </button>
      <button
        class="align-btn"
        data-align="spacingYMinus"
        title="Decrease Vertical Spacing"
      >
        <svg viewBox="0 0 24 24">
          <path d="M12 9l1.5 2h-3L12 9zM12 15l1.5-2h-3l1.5 2z" fill="currentColor"/>
        </svg>
      </button>
      <input
        type="number"
        id="spacing-input-y"
        value="10"
        min="0"
        max="500"
        step="10"
        title="Vertical spacing (px) — Enter to apply"
        style="
          width: 48px;
          background: #2d2d2d;
          color: #fff;
          border: 1px solid #555;
          border-radius: 4px;
          padding: 2px 4px;
          font-size: 11px;
          text-align: center;
          outline: none;
        "
      />
      <button
        class="align-btn"
        data-align="spacingYPlus"
        title="Increase Vertical Spacing"
      >
        <svg viewBox="0 0 24 24">
          <rect x="4" y="3" width="16" height="4" fill="currentColor" opacity="0.6"/>
          <rect x="4" y="17" width="16" height="4" fill="currentColor" opacity="0.6"/>
          <path d="M10 12v-1h4v1h-4z" fill="currentColor"/>
          <path d="M12 8l-1.5 2h3L12 8zM12 16l-1.5-2h3l1.5 2z" fill="currentColor"/>
        </svg>
      </button>
      <div
        style="width: 1px; height: 18px; background: #444; margin: 0 4px"
      ></div>
      <span class="align-title">Layout</span>
      <button
        class="align-btn"
        data-align="rowLayout"
        title="Row Layout (Horizontal)"
      >
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="2" y="7" width="5" height="10" rx="1"/>
          <rect x="9" y="7" width="5" height="10" rx="1"/>
          <rect x="16" y="7" width="5" height="10" rx="1"/>
        </svg>
      </button>
      <button
        class="align-btn"
        data-align="columnLayout"
        title="Column Layout (Vertical)"
      >
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="7" y="2" width="10" height="5" rx="1"/>
          <rect x="7" y="9" width="10" height="5" rx="1"/>
          <rect x="7" y="16" width="10" height="5" rx="1"/>
        </svg>
      </button>
      <button
        class="align-btn"
        data-align="gridLayout"
        title="Mosaic Layout"
      >
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </button>
      </div>
      <div id="scale-group" style="display:none;align-items:center;gap:4px;">
        <div class="scale-separator" style="width: 1px; height: 18px; background: #444; margin: 0 4px"></div>
        <span class="align-title">Scale</span>
        <button class="scale-btn" data-scale="0.5" title="Scale to 50% of original size">0.5x</button>
        <button class="scale-btn" data-scale="1" title="Scale to original size">1x</button>
        <button class="scale-btn" data-scale="2" title="Scale to 200% of original size">2x</button>
      </div>
      <div id="opacity-group" style="display:none;align-items:center;gap:4px;">
        <div style="width: 1px; height: 18px; background: #444; margin: 0 4px"></div>
        <span class="align-title">Opacity</span>
        <input type="range" id="opacity-slider" min="0" max="100" value="100" step="1" title="Element Opacity" style="width:80px;accent-color:#007acc;cursor:pointer;" />
        <span id="opacity-val" style="font-size:11px;color:#aaa;min-width:32px;text-align:right;">100%</span>
      </div>
    </div>

    <div id="toast">Canvas copied to clipboard as PNG!</div>
    <textarea id="text-ghost-input" rows="1"></textarea>

    <div id="ruler-corner"></div>
    <canvas id="ruler-top" class="ruler"></canvas>
    <canvas id="ruler-left" class="ruler"></canvas>

    <div id="canvas-container">
      <canvas id="canvas"></canvas>
    </div>
    <script type="module" src="./src/script.js"></script>
  </body>
</html>

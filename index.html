<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Canvas Workspace</title>
    <style>
      * {
        box-sizing: border-box;
        user-select: none;
      }
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #fff;
      }
      #canvas-container {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        cursor: crosshair;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
      }
      /* Toolbar Styles */
      #toolbar {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(30, 30, 30, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid #444;
        border-radius: 8px;
        padding: 8px 14px;
        display: flex;
        gap: 6px;
        align-items: center;
        z-index: 10;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      }
      .tool-btn {
        background: transparent;
        border: 1px solid transparent;
        color: #ccc;
        padding: 6px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 500;
        font-size: 13px;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 58px;
      }
      .tool-btn span {
        font-size: 9px;
        color: #777;
        margin-top: 2px;
      }
      .tool-btn:hover {
        background: #333;
        color: #fff;
      }
      .tool-btn.active {
        background: #007acc;
        color: #fff;
        border-color: #0098ff;
      }
      .separator {
        width: 1px;
        height: 30px;
        background: #444;
        margin: 0 4px;
      }
      .color-picker-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 10px;
        color: #aaa;
        gap: 2px;
      }
      .color-picker-wrapper input[type="color"] {
        border: none;
        width: 24px;
        height: 24px;
        border-radius: 4px;
        cursor: pointer;
        background: transparent;
      }
      /* Dynamic Control Groups */
      .control-group {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #aaa;
      }
      .control-group input[type="range"] {
        width: 168px;
        accent-color: #007acc;
        cursor: pointer;
      }
      .control-group select {
        background: #2d2d2d;
        color: #fff;
        border: 1px solid #555;
        padding: 4px;
        border-radius: 4px;
        outline: none;
        cursor: pointer;
      }
      #zoom-val {
        min-width: 36px;
        text-align: right;
      }
      /* Action buttons style */
      .action-btn {
        background: #28a745;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
      }
      .action-btn:hover {
        background: #218838;
      }
      /* Invisible Input element for text tools */
      #text-ghost-input {
        position: absolute;
        background: transparent;
        border: 1px dashed #007acc;
        color: #fff;
        font-family: sans-serif;
        outline: none;
        display: none;
        z-index: 100;
        padding: 2px;
      }
      /* Dynamic temporary toast notifications */
      #toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 122, 204, 0.95);
        color: #fff;
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 13px;
        z-index: 1000;
        display: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body style="background-color: #1e1e1e">
    <div id="toolbar">
      <button class="tool-btn active" id="tool-pan" data-tool="pan">
        Hand <span>[H]</span>
      </button>
      <button class="tool-btn" id="tool-select" data-tool="select">
        Select <span>[V]</span>
      </button>
      <div class="separator"></div>
      <button class="tool-btn" id="tool-pen" data-tool="pen">
        Pen <span>[B]</span>
      </button>
      <button class="tool-btn" id="tool-line" data-tool="line">
        Line <span>[L]</span>
      </button>
      <button class="tool-btn" id="tool-arrow" data-tool="arrow">
        Arrow <span>[A]</span>
      </button>
      <button class="tool-btn" id="tool-rect-border" data-tool="rect-border">
        Box <span>[R]</span>
      </button>
      <button class="tool-btn" id="tool-rect-fill" data-tool="rect-fill">
        Fill <span>[F]</span>
      </button>
      <div class="separator"></div>
      <button class="tool-btn" id="tool-text" data-tool="text">
        Text <span>[T]</span>
      </button>
      <button class="tool-btn" id="tool-eraser" data-tool="eraser">
        Eraser <span>[E]</span>
      </button>
      <button class="tool-btn" id="tool-obj-eraser" data-tool="obj-eraser">
        Obj Erase<span>[O]</span>
      </button>
      <div class="separator"></div>

      <div class="color-picker-wrapper">
        <input
          type="color"
          id="color-picker"
          value="#ff4444"
          title="Choose Drawing Color"
        />
        <span>Draw</span>
      </div>
      <div class="color-picker-wrapper">
        <input
          type="color"
          id="bg-color-picker"
          value="#1e1e1e"
          title="Choose Background Color"
        />
        <span>BG</span>
      </div>

      <div class="control-group">
        <span style="margin-left: 4px">Size:</span>
        <select id="font-size-select" title="Text Font Size">
          <option value="12">12px</option>
          <option value="16" selected>16px</option>
          <option value="20">20px</option>
          <option value="24">24px</option>
          <option value="32">32px</option>
          <option value="48">48px</option>
          <option value="64">64px</option>
        </select>
      </div>

      <div class="separator"></div>

      <div class="control-group">
        <span>Zoom:</span>
        <input type="range" id="zoom-slider" min="5" max="200" value="100" />
        <span id="zoom-val">100%</span>
      </div>

      <div class="separator"></div>
      <button class="action-btn" id="export-btn">Export Canvas PNG</button>
    </div>

    <div id="toast">Canvas copied to clipboard as PNG!</div>
    <input type="text" id="text-ghost-input" />

    <div id="canvas-container">
      <canvas id="canvas"></canvas>
    </div>

    <script>
      const container = document.getElementById("canvas-container");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const ghostInput = document.getElementById("text-ghost-input");
      const fontSizeSelect = document.getElementById("font-size-select");
      const zoomSlider = document.getElementById("zoom-slider");
      const zoomValDisplay = document.getElementById("zoom-val");
      const exportBtn = document.getElementById("export-btn");
      const toast = document.getElementById("toast");
      const bgColorPicker = document.getElementById("bg-color-picker");

      // Isolated offscreen layer for drawings
      const drawingCanvas = document.createElement("canvas");
      const drawingCtx = drawingCanvas.getContext("2d");

      const GRID_SIZE = 50;
      const CONSTANT_LINE_WIDTH = 4;

      let currentTool = "pan";
      let preSpaceTool = null;
      let drawColor = "#ff4444";
      let bgColor = "#1e1e1e";
      let currentFontSize = 16;
      let transform = { x: 0, y: 0, zoom: 1 };

      let isInteracting = false;
      let startX, startY;
      let isMiddleClick = false;
      let isRightClickHand = false;
      let lastMousePos = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
      };
      let isShiftPressed = false;
      let isSpacePressed = false;

      let images = [];
      let drawings = [];
      let activeShape = null;
      let activeTextCoord = null;

      let selectedElements = [];
      let isRegionSelecting = false;
      let regionStart = { x: 0, y: 0 };
      let regionEnd = { x: 0, y: 0 };
      let dragOffsets = [];

      let elementIdCounter = 0;

      container.addEventListener("contextmenu", (e) => {
        e.preventDefault();
      });

      function showToast(message) {
        toast.textContent = message;
        toast.style.display = "block";
        setTimeout(() => (toast.style.display = "none"), 2500);
      }

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        drawingCanvas.width = window.innerWidth;
        drawingCanvas.height = window.innerHeight;
        render();
      }
      window.addEventListener("resize", resize);

      function updateToolbarUI() {
        buttons.forEach((b) => {
          if (b.dataset.tool === currentTool) b.classList.add("active");
          else b.classList.remove("active");
        });
      }

      const buttons = document.querySelectorAll(".tool-btn");
      buttons.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          if (ghostInput.style.display === "block") bakeText();
          const targetBtn = e.target.closest(".tool-btn");
          currentTool = targetBtn.dataset.tool;
          if (currentTool !== "select") selectedElements = [];
          updateToolbarUI();
          updateCursor();
          render();
        });
      });

      const colorPicker = document.getElementById("color-picker");
      colorPicker.addEventListener(
        "input",
        (e) => (drawColor = e.target.value),
      );

      bgColorPicker.addEventListener("input", (e) => {
        bgColor = e.target.value;
        document.body.style.backgroundColor = bgColor;
        render();
      });

      fontSizeSelect.addEventListener("change", (e) => {
        currentFontSize = parseInt(e.target.value);
        if (ghostInput.style.display === "block") {
          ghostInput.style.fontSize = `${currentFontSize * transform.zoom}px`;
        }
      });

      function updateCursor() {
        if (currentTool === "pan" || isRightClickHand)
          container.style.cursor = isInteracting ? "grabbing" : "grab";
        else if (currentTool === "select") container.style.cursor = "default";
        else if (currentTool === "eraser") container.style.cursor = "cell";
        else if (currentTool === "obj-eraser")
          container.style.cursor = "pointer";
        else if (currentTool === "text") container.style.cursor = "text";
        else container.style.cursor = "crosshair";
      }
      updateCursor();

      window.addEventListener("mousemove", (e) => {
        lastMousePos.x = e.clientX;
        lastMousePos.y = e.clientY;
      });

      window.addEventListener("keydown", (e) => {
        if (e.key === "Shift") isShiftPressed = true;

        if (e.key === " " || e.code === "Space") {
          if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT")
            return;
          e.preventDefault();
          if (!isSpacePressed) {
            isSpacePressed = true;
            if (currentTool !== "pan") {
              preSpaceTool = currentTool;
              currentTool = "pan";
              updateToolbarUI();
              updateCursor();
            }
          }
        }
      });

      window.addEventListener("keyup", (e) => {
        if (e.key === "Shift") isShiftPressed = false;

        if (e.key === " " || e.code === "Space") {
          if (isSpacePressed) {
            isSpacePressed = false;
            if (preSpaceTool !== null) {
              currentTool = preSpaceTool;
              preSpaceTool = null;
              updateToolbarUI();
              updateCursor();
              render();
            }
          }
        }
      });

      window.addEventListener("keydown", (e) => {
        if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT")
          return;
        const key = e.key.toLowerCase();

        if (e.key === "+" || e.key === "=") {
          e.preventDefault();
          applyZoom(transform.zoom * 1.1, lastMousePos.x, lastMousePos.y);
          return;
        }
        if (e.key === "-" || e.key === "_") {
          e.preventDefault();
          applyZoom(transform.zoom / 1.1, lastMousePos.x, lastMousePos.y);
          return;
        }

        if (key === "z") {
          e.preventDefault();
          let nextZoom = Math.abs(transform.zoom - 1.0) < 0.01 ? 0.2 : 1.0;
          applyZoom(nextZoom, lastMousePos.x, lastMousePos.y);
          return;
        }

        if (e.key === "Delete" || e.key === "Backspace") {
          if (currentTool === "select" && selectedElements.length > 0) {
            const idsToRemove = selectedElements.map((el) => el.id);
            images = images.filter((img) => !idsToRemove.includes(img.id));
            drawings = drawings.filter((d) => !idsToRemove.includes(d.id));

            showToast(`Removed ${selectedElements.length} selected asset(s)`);
            selectedElements = [];
            render();
          }
          return;
        }

        let targetTool = null;
        if (key === "h") targetTool = "pan";
        if (key === "v") targetTool = "select";
        if (key === "b") targetTool = "pen";
        if (key === "l") targetTool = "line";
        if (key === "a") targetTool = "arrow";
        if (key === "r") targetTool = "rect-border";
        if (key === "f") targetTool = "rect-fill";
        if (key === "t") targetTool = "text";
        if (key === "e") targetTool = "eraser";
        if (key === "o") targetTool = "obj-eraser";

        if (targetTool) {
          preSpaceTool = null;
          const btn = document.querySelector(`[data-tool="${targetTool}"]`);
          if (btn) btn.click();
        }
      });

      function screenToWorld(sx, sy) {
        return {
          x: (sx - transform.x) / transform.zoom,
          y: (sy - transform.y) / transform.zoom,
        };
      }
      function worldToScreen(wx, wy) {
        return {
          x: wx * transform.zoom + transform.x,
          y: wy * transform.zoom + transform.y,
        };
      }

      function snapToGrid(val) {
        return Math.round(val / GRID_SIZE) * GRID_SIZE;
      }

      function constraintToAngle(start, current) {
        const dx = current.x - start.x;
        const dy = current.y - start.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        let angle = Math.atan2(dy, dx);
        angle = Math.round(angle / (Math.PI / 4)) * (Math.PI / 4);
        return {
          x: start.x + distance * Math.cos(angle),
          y: start.y + distance * Math.sin(angle),
        };
      }

      function getPtToSegmentDist(p, a, b) {
        const l2 = Math.pow(a.x - b.x, 2) + Math.pow(a.y - b.y, 2);
        if (l2 === 0)
          return Math.sqrt(Math.pow(p.x - a.x, 2) + Math.pow(p.y - a.y, 2));
        let t = ((p.x - a.x) * (b.x - a.x) + (p.y - a.y) * (b.y - a.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.sqrt(
          Math.pow(p.x - (a.x + t * (b.x - a.x)), 2) +
            Math.pow(p.y - (a.y + t * (b.y - a.y)), 2),
        );
      }

      function getShapeBounds(shape) {
        let minX = Infinity,
          minY = Infinity,
          maxX = -Infinity,
          maxY = -Infinity;
        if (shape.type === "pen" || shape.type === "eraser") {
          shape.points.forEach((p) => {
            if (p.x < minX) minX = p.x;
            if (p.y < minY) minY = p.y;
            if (p.x > maxX) maxX = p.x;
            if (p.y > maxY) maxY = p.y;
          });
        } else if (shape.type === "text") {
          minX = shape.start.x;
          minY = shape.start.y;
          maxX = shape.start.x + (shape.w || 50);
          maxY = shape.start.y + (shape.h || shape.fontSize);
        } else {
          minX = Math.min(shape.start.x, shape.end.x);
          minY = Math.min(shape.start.y, shape.end.y);
          maxX = Math.max(shape.start.x, shape.end.x);
          maxY = Math.max(shape.start.y, shape.end.y);
        }
        return { x: minX, y: minY, w: maxX - minX, h: maxY - minY, maxX, maxY };
      }

      function isPointHittingShape(p, shape) {
        const threshold = 12 / transform.zoom;
        if (shape.type === "pen") {
          for (let i = 0; i < shape.points.length - 1; i++) {
            if (
              getPtToSegmentDist(p, shape.points[i], shape.points[i + 1]) <
              threshold
            )
              return true;
          }
        } else if (shape.type === "line" || shape.type === "arrow") {
          return getPtToSegmentDist(p, shape.start, shape.end) < threshold;
        } else if (shape.type === "rect-border" || shape.type === "rect-fill") {
          const b = getShapeBounds(shape);
          if (shape.type === "rect-fill") {
            return p.x >= b.x && p.x <= b.maxX && p.y >= b.y && p.y <= b.maxY;
          } else {
            const top =
              getPtToSegmentDist(p, { x: b.x, y: b.y }, { x: b.maxX, y: b.y }) <
              threshold;
            const bot =
              getPtToSegmentDist(
                p,
                { x: b.x, y: b.maxY },
                { x: b.maxX, y: b.maxY },
              ) < threshold;
            const lft =
              getPtToSegmentDist(p, { x: b.x, y: b.y }, { x: b.x, y: b.maxY }) <
              threshold;
            const rgt =
              getPtToSegmentDist(
                p,
                { x: b.maxX, y: b.y },
                { x: b.maxX, y: b.maxY },
              ) < threshold;
            return top || bot || lft || rgt;
          }
        } else if (shape.type === "text") {
          const b = getShapeBounds(shape);
          return p.x >= b.x && p.x <= b.maxX && p.y >= b.y && p.y <= b.maxY;
        }
        return false;
      }

      function handleImageFile(file, worldX, worldY) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            images.push({
              id: "img_" + elementIdCounter++,
              elementType: "image",
              img: img,
              x: worldX - img.width / 2,
              y: worldY - img.height / 2,
              w: img.width,
              h: img.height,
            });
            render();
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      }

      window.addEventListener("paste", (e) => {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let item of items) {
          if (item.type.indexOf("image") === 0) {
            const blob = item.getAsFile();
            const worldCenter = screenToWorld(
              window.innerWidth / 2,
              window.innerHeight / 2,
            );
            handleImageFile(blob, worldCenter.x, worldCenter.y);
          }
        }
      });

      window.addEventListener("dragover", (e) => {
        e.preventDefault();
      });

      window.addEventListener("drop", (e) => {
        e.preventDefault();
        if (e.dataTransfer && e.dataTransfer.files.length > 0) {
          const dropWorldPos = screenToWorld(e.clientX, e.clientY);
          for (let file of e.dataTransfer.files) {
            if (file.type.indexOf("image/") === 0) {
              handleImageFile(file, dropWorldPos.x, dropWorldPos.y);
            }
          }
        }
      });

      // --- MASTER RENDERING PIPELINE ---
      function render(targetCtx = ctx, isExporting = false) {
        if (!isExporting) {
          targetCtx.clearRect(0, 0, canvas.width, canvas.height);
          drawingCanvas.width = canvas.width;
          drawingCanvas.height = canvas.height;
        }

        const vectorCtx = isExporting ? targetCtx : drawingCtx;
        vectorCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);

        targetCtx.save();
        vectorCtx.save();

        if (!isExporting) {
          targetCtx.translate(transform.x, transform.y);
          targetCtx.scale(transform.zoom, transform.zoom);

          vectorCtx.translate(transform.x, transform.y);
          vectorCtx.scale(transform.zoom, transform.zoom);
        }

        // 1. Draw Pasted Images directly to the main layout context
        images.forEach((imgData) => {
          targetCtx.drawImage(
            imgData.img,
            imgData.x,
            imgData.y,
            imgData.w,
            imgData.h,
          );
          if (!isExporting && currentTool === "select") {
            const isSelected = selectedElements.some(
              (el) => el.id === imgData.id,
            );
            targetCtx.strokeStyle = isSelected ? "#ff4444" : "#007acc";
            targetCtx.lineWidth = (isSelected ? 3 : 1.5) / transform.zoom;
            targetCtx.strokeRect(imgData.x, imgData.y, imgData.w, imgData.h);
          }
        });

        // 2. Separate shapes and erasers so erasers always stack on top of standard vector structures
        const activeDrawings = drawings.filter((d) => d.type !== "eraser");
        const activeErasers = drawings.filter((d) => d.type === "eraser");

        // Draw standard visible vector structures first
        activeDrawings.forEach((shape) => {
          drawShape(vectorCtx, shape, isExporting);

          if (
            !isExporting &&
            currentTool === "select" &&
            shape.type !== "text"
          ) {
            const isSelected = selectedElements.some(
              (el) => el.id === shape.id,
            );
            if (isSelected) {
              const b = getShapeBounds(shape);
              vectorCtx.save();
              vectorCtx.strokeStyle = "#ff4444";
              vectorCtx.lineWidth = 1.5 / transform.zoom;
              vectorCtx.setLineDash([4 / transform.zoom, 4 / transform.zoom]);
              vectorCtx.strokeRect(b.x - 4, b.y - 4, b.w + 8, b.h + 8);
              vectorCtx.restore();
            }
          }
        });

        // Handle current preview drawing safely based on type
        if (!isExporting && activeShape && activeShape.type !== "eraser") {
          drawShape(vectorCtx, activeShape, false);
        }

        // Draw eraser strokes last so they cleanly subtract drawings underneath them
        activeErasers.forEach((eraserPath) => {
          drawShape(vectorCtx, eraserPath, isExporting);
        });

        // Handle active preview eraser stroke last
        if (!isExporting && activeShape && activeShape.type === "eraser") {
          drawShape(vectorCtx, activeShape, false);
        }

        targetCtx.restore();
        vectorCtx.restore();

        // 3. Composite the drawings layer onto the main canvas view
        if (!isExporting) {
          targetCtx.drawImage(drawingCanvas, 0, 0);
        }

        // 4. Draw selection box UI
        if (!isExporting) {
          targetCtx.save();
          targetCtx.translate(transform.x, transform.y);
          targetCtx.scale(transform.zoom, transform.zoom);

          if (isRegionSelecting) {
            targetCtx.strokeStyle = "rgba(0, 122, 204, 0.8)";
            targetCtx.fillStyle = "rgba(0, 122, 204, 0.1)";
            targetCtx.lineWidth = 1.5 / transform.zoom;
            targetCtx.setLineDash([6 / transform.zoom, 4 / transform.zoom]);

            const rx = Math.min(regionStart.x, regionEnd.x);
            const ry = Math.min(regionStart.y, regionEnd.y);
            const rw = Math.abs(regionEnd.x - regionStart.x);
            const rh = Math.abs(regionEnd.y - regionStart.y);

            targetCtx.fillRect(rx, ry, rw, rh);
            targetCtx.strokeRect(rx, ry, rw, rh);
          }
          targetCtx.restore();
        }

        if (
          !isExporting &&
          ghostInput.style.display === "block" &&
          activeTextCoord
        ) {
          const screenPos = worldToScreen(activeTextCoord.x, activeTextCoord.y);
          ghostInput.style.left = `${screenPos.x}px`;
          ghostInput.style.top = `${screenPos.y - currentFontSize * transform.zoom * 0.2}px`;
          ghostInput.style.fontSize = `${currentFontSize * transform.zoom}px`;
        }
      }

      function drawShape(targetCtx, shape, isExporting) {
        let calculatedWidth = shape.width;
        if (shape.type !== "eraser" && shape.type !== "text") {
          calculatedWidth =
            CONSTANT_LINE_WIDTH / (isExporting ? 1 : transform.zoom);
        }

        if (shape.type === "eraser") {
          targetCtx.save();
          targetCtx.globalCompositeOperation = "destination-out";
          targetCtx.lineWidth = shape.width;
          targetCtx.strokeStyle = "rgba(0,0,0,1)";
          targetCtx.lineCap = "round";
          targetCtx.lineJoin = "round";
          if (shape.points.length >= 2) {
            targetCtx.beginPath();
            targetCtx.moveTo(shape.points[0].x, shape.points[0].y);
            for (let i = 1; i < shape.points.length; i++)
              targetCtx.lineTo(shape.points[i].x, shape.points[i].y);
            targetCtx.stroke();
          }
          targetCtx.restore();
          return;
        }

        targetCtx.save();
        targetCtx.strokeStyle = shape.color;
        targetCtx.fillStyle = shape.color;
        targetCtx.lineWidth = calculatedWidth;
        targetCtx.lineCap = "round";
        targetCtx.lineJoin = "round";

        if (shape.type === "pen") {
          if (shape.points.length < 2) {
            targetCtx.restore();
            return;
          }
          targetCtx.beginPath();
          targetCtx.moveTo(shape.points[0].x, shape.points[0].y);
          for (let i = 1; i < shape.points.length; i++)
            targetCtx.lineTo(shape.points[i].x, shape.points[i].y);
          targetCtx.stroke();
        } else if (shape.type === "line") {
          targetCtx.beginPath();
          targetCtx.moveTo(shape.start.x, shape.start.y);
          targetCtx.lineTo(shape.end.x, shape.end.y);
          targetCtx.stroke();
        } else if (shape.type === "arrow") {
          const dx = shape.end.x - shape.start.x;
          const dy = shape.end.y - shape.start.y;
          const len = Math.sqrt(dx * dx + dy * dy);

          if (len > 0.1) {
            const ux = dx / len;
            const uy = dy / len;

            const headLength = Math.max(
              16 / (isExporting ? 1 : transform.zoom),
              calculatedWidth * 3.5,
            );
            const headWidth = Math.max(
              10 / (isExporting ? 1 : transform.zoom),
              calculatedWidth * 2.2,
            );

            const cx = shape.end.x - headLength * ux;
            const cy = shape.end.y - headLength * uy;
            const nx = -uy * headWidth;
            const ny = ux * headWidth;

            targetCtx.beginPath();
            targetCtx.moveTo(shape.start.x, shape.start.y);
            targetCtx.lineTo(cx, cy);
            targetCtx.stroke();

            targetCtx.beginPath();
            targetCtx.moveTo(shape.end.x, shape.end.y);
            targetCtx.lineTo(cx + nx, cy + ny);
            targetCtx.lineTo(cx - nx, cy - ny);
            targetCtx.closePath();
            targetCtx.fill();
          } else {
            targetCtx.beginPath();
            targetCtx.moveTo(shape.start.x, shape.start.y);
            targetCtx.lineTo(shape.end.x, shape.end.y);
            targetCtx.stroke();
          }
        } else if (shape.type === "rect-border") {
          targetCtx.strokeRect(
            shape.start.x,
            shape.start.y,
            shape.end.x - shape.start.x,
            shape.end.y - shape.start.y,
          );
        } else if (shape.type === "rect-fill") {
          targetCtx.fillRect(
            shape.start.x,
            shape.start.y,
            shape.end.x - shape.start.x,
            shape.end.y - shape.start.y,
          );
        } else if (shape.type === "text") {
          targetCtx.font = `${shape.fontSize}px sans-serif`;
          targetCtx.textBaseline = "top";
          targetCtx.fillText(shape.text, shape.start.x, shape.start.y);

          const metrics = targetCtx.measureText(shape.text);
          shape.w = metrics.width;
          shape.h = shape.fontSize;

          if (!isExporting && currentTool === "select") {
            const isSelected = selectedElements.some(
              (el) => el.id === shape.id,
            );
            targetCtx.strokeStyle = isSelected
              ? "#ff4444"
              : "rgba(0, 122, 204, 0.4)";
            targetCtx.lineWidth = 1 / (isExporting ? 1 : transform.zoom);
            targetCtx.strokeRect(
              shape.start.x - 2,
              shape.start.y - 2,
              shape.w + 4,
              shape.h + 4,
            );
          }
        }
        targetCtx.restore();
      }

      // --- COMPREHENSIVE CLICK ENGINE ---
      container.addEventListener("mousedown", (e) => {
        if (ghostInput.style.display === "block" && e.target !== ghostInput)
          bakeText();

        isInteracting = true;
        startX = e.clientX;
        startY = e.clientY;

        isMiddleClick = e.button === 1;
        isRightClickHand = e.button === 2;

        let worldPos = screenToWorld(e.clientX, e.clientY);

        if (isMiddleClick || isRightClickHand || currentTool === "pan") {
          updateCursor();
          return;
        }

        if (currentTool === "text") {
          isInteracting = false;
          activeTextCoord = worldPos;
          ghostInput.value = "";
          ghostInput.style.display = "block";
          ghostInput.style.color = drawColor;
          const screenPos = worldToScreen(worldPos.x, worldPos.y);
          ghostInput.style.left = `${screenPos.x}px`;
          ghostInput.style.top = `${screenPos.y - currentFontSize * transform.zoom * 0.2}px`;
          ghostInput.style.fontSize = `${currentFontSize * transform.zoom}px`;
          setTimeout(() => ghostInput.focus(), 20);
          return;
        }

        if (currentTool === "obj-eraser") {
          isInteracting = false;
          let erasedSomething = false;

          for (let i = drawings.length - 1; i >= 0; i--) {
            if (isPointHittingShape(worldPos, drawings[i])) {
              drawings.splice(i, 1);
              erasedSomething = true;
              break;
            }
          }

          if (erasedSomething) {
            render();
            showToast("Drawing path removed");
          }
          return;
        }

        if (currentTool === "select") {
          let clickedElement = null;

          for (let item of selectedElements) {
            if (item.elementType === "image") {
              if (
                worldPos.x >= item.x &&
                worldPos.x <= item.x + item.w &&
                worldPos.y >= item.y &&
                worldPos.y <= item.y + item.h
              ) {
                clickedElement = item;
                break;
              }
            } else {
              if (isPointHittingShape(worldPos, item)) {
                clickedElement = item;
                break;
              }
            }
          }

          if (!clickedElement) {
            for (let i = drawings.length - 1; i >= 0; i--) {
              if (isPointHittingShape(worldPos, drawings[i])) {
                clickedElement = drawings[i];
                clickedElement.elementType = "drawing";
                selectedElements = [clickedElement];
                break;
              }
            }
          }

          if (!clickedElement) {
            for (let i = images.length - 1; i >= 0; i--) {
              const img = images[i];
              if (
                worldPos.x >= img.x &&
                worldPos.x <= img.x + img.w &&
                worldPos.y >= img.y &&
                worldPos.y <= img.y + img.h
              ) {
                clickedElement = img;
                clickedElement.elementType = "image";
                selectedElements = [clickedElement];
                images.push(images.splice(i, 1)[0]);
                break;
              }
            }
          }

          if (clickedElement) {
            isRegionSelecting = false;
            dragOffsets = selectedElements.map((el) => {
              if (el.elementType === "image") {
                return {
                  id: el.id,
                  type: "image",
                  x: el.x,
                  y: el.y,
                  startMouse: { ...worldPos },
                };
              } else if (el.type === "pen" || el.type === "eraser") {
                return {
                  id: el.id,
                  type: "points",
                  points: el.points.map((p) => ({ ...p })),
                  startMouse: { ...worldPos },
                };
              } else {
                return {
                  id: el.id,
                  type: "vectors",
                  start: { ...el.start },
                  end: { ...el.end },
                  startMouse: { ...worldPos },
                };
              }
            });
          } else {
            isRegionSelecting = true;
            regionStart = { ...worldPos };
            regionEnd = { ...worldPos };
            selectedElements = [];
          }
          render();
        } else if (
          [
            "pen",
            "line",
            "arrow",
            "rect-border",
            "rect-fill",
            "eraser",
          ].includes(currentTool)
        ) {
          activeShape = {
            id: "draw_" + elementIdCounter++,
            type: currentTool,
            color: drawColor,
            width: CONSTANT_LINE_WIDTH,
            start: worldPos,
            end: worldPos,
            points: [worldPos],
          };
          if (currentTool === "eraser") activeShape.width = 30 / transform.zoom;
        }
      });

      container.addEventListener("mousemove", (e) => {
        if (!isInteracting) return;

        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        let worldPos = screenToWorld(e.clientX, e.clientY);

        if (isMiddleClick || isRightClickHand || currentTool === "pan") {
          transform.x += dx;
          transform.y += dy;
          startX = e.clientX;
          startY = e.clientY;
          updateZoomSliderValue();
          render();
          return;
        }

        if (currentTool === "select") {
          if (isRegionSelecting) {
            regionEnd = { ...worldPos };
            render();
          } else if (selectedElements.length > 0) {
            selectedElements.forEach((el) => {
              const offset = dragOffsets.find((o) => o.id === el.id);
              if (!offset) return;

              const curDx = worldPos.x - offset.startMouse.x;
              const curDy = worldPos.y - offset.startMouse.y;

              if (offset.type === "image") {
                let tx = offset.x + curDx;
                let ty = offset.y + curDy;
                if (isShiftPressed) {
                  tx = snapToGrid(tx);
                  ty = snapToGrid(ty);
                }
                el.x = tx;
                el.y = ty;
              } else if (offset.type === "points") {
                el.points = offset.points.map((p, idx) => {
                  let tx = p.x + curDx;
                  let ty = p.y + curDy;
                  if (isShiftPressed && idx === 0) {
                    return { x: snapToGrid(tx), y: snapToGrid(ty) };
                  }
                  return { x: tx, y: ty };
                });
                if (isShiftPressed && el.points.length > 0) {
                  const finalDx = el.points[0].x - offset.points[0].x;
                  const finalDy = el.points[0].y - offset.points[0].y;
                  for (let k = 1; k < el.points.length; k++) {
                    el.points[k].x = offset.points[k].x + finalDx;
                    el.points[k].y = offset.points[k].y + finalDy;
                  }
                }
              } else {
                let tsx = offset.start.x + curDx;
                let tsy = offset.start.y + curDy;
                let tex = offset.end.x + curDx;
                let tey = offset.end.y + curDy;
                if (isShiftPressed) {
                  const oldWidth = tex - tsx;
                  const oldHeight = tey - tsy;
                  tsx = snapToGrid(tsx);
                  tsy = snapToGrid(tsy);
                  tex = tsx + oldWidth;
                  tey = tsy + oldHeight;
                }
                el.start.x = tsx;
                el.start.y = tsy;
                el.end.x = tex;
                el.end.y = tey;
              }
            });
            render();
          }
        } else if (activeShape) {
          if (activeShape.type === "pen" || activeShape.type === "eraser") {
            if (isShiftPressed && activeShape.points.length > 0)
              worldPos = constraintToAngle(activeShape.points[0], worldPos);
            activeShape.points.push(worldPos);
          } else {
            if (isShiftPressed)
              worldPos = constraintToAngle(activeShape.start, worldPos);
            activeShape.end = worldPos;
          }
          render();
        }
      });

      window.addEventListener("mouseup", (e) => {
        if (!isInteracting) return;
        isInteracting = false;

        if (currentTool === "select" && isRegionSelecting) {
          isRegionSelecting = false;

          const rx = Math.min(regionStart.x, regionEnd.x);
          const ry = Math.min(regionStart.y, regionEnd.y);
          const rw = Math.abs(regionEnd.x - regionStart.x);
          const rh = Math.abs(regionEnd.y - regionStart.y);

          selectedElements = [];

          images.forEach((img) => {
            if (
              img.x >= rx &&
              img.x + img.w <= rx + rw &&
              img.y >= ry &&
              img.y + img.h <= ry + rh
            )
              selectedElements.push(img);
          });

          drawings.forEach((shape) => {
            const b = getShapeBounds(shape);
            const overlaps =
              b.x < rx + rw &&
              b.x + b.w > rx &&
              b.y < ry + rh &&
              b.y + b.h > ry;
            if (overlaps) {
              if (shape.type !== "text") shape.elementType = "drawing";
              selectedElements.push(shape);
            }
          });

          if (selectedElements.length > 0)
            showToast(`Selected group of ${selectedElements.length} assets`);
          render();
        }

        if (activeShape) {
          drawings.push(activeShape);
          activeShape = null;
          render();
        }

        isMiddleClick = false;
        isRightClickHand = false;
        updateCursor();
      });

      function bakeText() {
        const val = ghostInput.value.trim();
        if (val && activeTextCoord) {
          drawings.push({
            id: "text_" + elementIdCounter++,
            elementType: "text",
            type: "text",
            text: val,
            color: drawColor,
            fontSize: currentFontSize,
            start: { x: activeTextCoord.x, y: activeTextCoord.y },
          });
        }
        ghostInput.style.display = "none";
        activeTextCoord = null;
        render();
      }

      ghostInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          bakeText();
          container.focus();
        } else if (e.key === "Escape") {
          ghostInput.style.display = "none";
          activeTextCoord = null;
          container.focus();
          render();
        }
      });

      function applyZoom(newZoom, centerX, centerY) {
        if (newZoom < 0.05 || newZoom > 2.0) return;
        const oldZoom = transform.zoom;
        transform.x = centerX - (centerX - transform.x) * (newZoom / oldZoom);
        transform.y = centerY - (centerY - transform.y) * (newZoom / oldZoom);
        transform.zoom = newZoom;
        updateZoomSliderValue();
        render();
      }

      function updateZoomSliderValue() {
        const percent = Math.round(transform.zoom * 100);
        zoomSlider.value = percent;
        zoomValDisplay.textContent = `${percent}%`;
      }

      container.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();
          const zoomFactor = 1.1;
          const newZoom =
            e.deltaY < 0
              ? transform.zoom * zoomFactor
              : transform.zoom / zoomFactor;
          applyZoom(newZoom, e.clientX, e.clientY);
        },
        { passive: false },
      );

      zoomSlider.addEventListener("input", (e) => {
        const targetZoom = parseFloat(e.target.value) / 100;
        applyZoom(targetZoom, window.innerWidth / 2, window.innerHeight / 2);
      });

      zoomSlider.addEventListener("change", () => {
        zoomSlider.blur();
      });

      exportBtn.addEventListener("click", async () => {
        if (images.length === 0 && drawings.length === 0) {
          showToast("Canvas is completely empty!");
          return;
        }

        let minX = Infinity,
          minY = Infinity;
        let maxX = -Infinity,
          maxY = -Infinity;
        function expandBounds(x, y) {
          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }

        images.forEach((img) => {
          expandBounds(img.x, img.y);
          expandBounds(img.x + img.w, img.y + img.h);
        });
        drawings.forEach((shape) => {
          const b = getShapeBounds(shape);
          expandBounds(b.x, b.y);
          expandBounds(b.x + b.w, b.y + b.h);
        });

        const padding = 50;
        minX -= padding;
        minY -= padding;
        maxX += padding;
        maxY += padding;

        const exportCanvas = document.createElement("canvas");
        exportCanvas.width = maxX - minX;
        exportCanvas.height = maxY - minY;
        const exportCtx = exportCanvas.getContext("2d");

        exportCtx.fillStyle = bgColor;
        exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
        exportCtx.translate(-minX, -minY);

        render(exportCtx, true);

        exportCanvas.toBlob(async (blob) => {
          if (!blob) {
            showToast("Failed to compile image asset");
            return;
          }
          try {
            const item = new ClipboardItem({ "image/png": blob });
            await navigator.clipboard.write([item]);
            showToast("Full content PNG copied to Clipboard!");
          } catch (err) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `full_canvas_${Date.now()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("Downloaded PNG File (Clipboard API Blocked)");
          }
        }, "image/png");
      });

      resize();
    </script>
  </body>
</html>
